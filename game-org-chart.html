<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solopreneur - AI Org World</title>
<style>
/* ═══ Color Scheme ═══ */
:root {
  --amaranth:   #DB3E55;
  --forest:     #40812E;
  --moss:       #7FC761;
  --mint:       #75C4A4;
  --mauve-d:    #634255;
  --mauve:      #9D7375;
  --sand:       #DCB5A3;
  --fawn:       #D4B269;
  --sky:        #63ACF0;
  --granite:    #87888E;
  --pk-black:   #1a1a1a;
  --pk-white:   #f8f4ec;
  --pk-cream:   #e8dfc8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--mauve-d); overflow: hidden; font-family: monospace; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }

/* ═══ Pokémon Dialog Box System ═══ */
.poke-box {
  position: relative;
  background: var(--pk-white);
  border: 4px solid var(--pk-black);
  box-shadow: inset 0 0 0 2px var(--pk-black);
}
.pk-corner {
  position: absolute; width: 13px; height: 13px;
  background: var(--amaranth); border: 2px solid var(--pk-black);
  border-radius: 50%; z-index: 20; pointer-events: none;
}
.pk-tl { top: -8px; left: -8px; }
.pk-tr { top: -8px; right: -8px; }
.pk-bl { bottom: -8px; left: -8px; }
.pk-br { bottom: -8px; right: -8px; }

/* ═══ Pixel-Art Button System ═══ */
.poke-btn {
  font-family: monospace; font-size: 0.8rem; font-weight: bold;
  text-transform: uppercase; letter-spacing: 2px;
  padding: 9px 20px; border: 3px solid var(--pk-black);
  cursor: pointer; position: relative; color: var(--pk-black);
  box-shadow: 4px 4px 0 var(--pk-black);
  background-image: linear-gradient(to bottom,
    rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.55) 32%,
    transparent 32%, rgba(0,0,0,0.08) 100%);
  image-rendering: pixelated;
  transition: none;
}
.poke-btn:hover { filter: brightness(1.1); }
.poke-btn:active { transform: translate(4px,4px); box-shadow: none; }
.poke-btn-green { background-color: var(--moss); }
.poke-btn-fawn  { background-color: var(--fawn); }
.poke-btn-red   { background-color: var(--amaranth); color: var(--pk-white); }
.poke-btn-sky   { background-color: var(--sky); }
.poke-btn-grey  { background-color: var(--granite); color: var(--pk-white); }
.poke-btn-mint  { background-color: var(--mint); }

/* ═══ Detail Panel ═══ */
#detail-panel {
  position: fixed; top: 0; right: 0; width: 420px; max-width: 92vw; height: 100vh;
  background: var(--mauve-d); border-left: 4px solid var(--pk-black); z-index: 100;
  transform: translateX(100%); transition: transform 0.25s ease;
  display: flex; flex-direction: column;
  box-shadow: -6px 0 0 0 var(--pk-black);
}
#detail-panel.open { transform: translateX(0); }
#detail-scrim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(60,30,40,0.55); z-index: 99; display: none; }
#detail-scrim.open { display: block; }
.dp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 3px solid var(--pk-black);
  background: var(--mauve);
}
.dp-header h2 { color: var(--pk-white); font-size: 1rem; margin: 0; font-family: monospace; }
.dp-badge {
  font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px;
  padding: 3px 8px; border: 2px solid var(--pk-black);
  margin-right: 10px; font-weight: 700; font-family: monospace; background: var(--pk-white);
}
.dp-close {
  background: var(--amaranth); border: 2px solid var(--pk-black);
  color: var(--pk-white); font-size: 1.1rem; cursor: pointer;
  padding: 2px 8px; font-weight: bold;
  box-shadow: 2px 2px 0 var(--pk-black);
}
.dp-close:active { transform: translate(2px,2px); box-shadow: none; }
.dp-body { padding: 16px; overflow-y: auto; flex: 1; font-size: 0.8rem; line-height: 1.6; color: var(--sand); font-family: monospace; }
.dp-section { margin-bottom: 16px; }
.dp-section-title {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--fawn); margin-bottom: 8px; padding-bottom: 4px;
  border-bottom: 2px solid var(--mauve);
}
.dp-info-row { display: flex; justify-content: space-between; padding: 4px 0; }
.dp-info-label { color: var(--granite); font-size: 0.7rem; }
.dp-info-value { color: var(--pk-white); font-size: 0.75rem; }
.dp-tag { display: inline-block; font-size: 0.65rem; padding: 2px 6px; border: 1px solid var(--pk-black); margin: 2px 2px 2px 0; }
.dp-tag-skill { background: var(--mauve); color: var(--pk-white); }
.dp-tag-mcp   { background: var(--mint);  color: var(--pk-black); }
.task-item { padding: 8px 10px; margin-bottom: 6px; background: var(--mauve); border-left: 4px solid var(--granite); border: 1px solid var(--pk-black); }
.task-item.running  { border-left: 4px solid var(--fawn); }
.task-item.thinking { border-left: 4px solid var(--sky); }
.task-item.done     { border-left: 4px solid var(--moss); opacity: 0.65; }
.task-status { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
.task-status.running  { color: var(--fawn); }
.task-status.thinking { color: var(--sky); }
.task-status.done     { color: var(--moss); }
.task-name { color: var(--pk-white); font-size: 0.75rem; margin-bottom: 2px; }
.task-detail { color: var(--granite); font-size: 0.65rem; }
.task-progress { height: 4px; background: var(--mauve-d); border: 1px solid var(--pk-black); margin-top: 5px; overflow: hidden; }
.task-progress-bar { height: 100%; }

/* ═══ Onboarding Overlay ═══ */
#onboarding-overlay {
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    45deg, var(--mauve-d) 0px, var(--mauve-d) 4px,
    rgba(99,66,85,0.7) 4px, rgba(99,66,85,0.7) 8px);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  font-family: monospace;
}
#onboarding-box {
  width: 520px; max-width: 92vw;
  box-shadow: 6px 6px 0 var(--pk-black);
}
#onboarding-header {
  background: var(--forest); border-bottom: 4px solid var(--pk-black);
  padding: 20px 28px 16px;
}
#onboarding-header .ob-label {
  font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
  color: var(--moss); margin-bottom: 8px;
}
#onboarding-header h1 {
  font-size: 1.4rem; color: var(--pk-white); letter-spacing: 2px; margin: 0;
  text-transform: uppercase; text-shadow: 2px 2px 0 var(--pk-black);
}
#onboarding-header p {
  font-size: 0.75rem; color: var(--sand); margin: 6px 0 0; letter-spacing: 1px;
}
#onboarding-body {
  background: var(--pk-white); padding: 24px 28px 28px;
}
#onboarding-body label {
  display: block; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--mauve-d); margin-bottom: 10px; font-weight: bold;
}
#onboarding-input {
  width: 100%; padding: 10px 14px; font-family: monospace; font-size: 0.9rem;
  background: var(--pk-cream); border: 3px solid var(--pk-black); color: var(--pk-black);
  outline: none; box-sizing: border-box;
}
#onboarding-input:focus { border-color: var(--forest); box-shadow: 2px 2px 0 var(--forest); }
#onboarding-input::placeholder { color: var(--granite); }
#onboarding-submit { margin-top: 16px; width: 100%; }
.ob-agents {
  display: flex; gap: 8px; margin-top: 20px; padding-top: 16px;
  border-top: 2px solid var(--pk-black);
}
.ob-agent-chip {
  flex: 1; padding: 6px 4px; text-align: center;
  background: var(--pk-cream); border: 2px solid var(--pk-black);
  font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--pk-black); font-weight: bold;
}

/* ═══ Title Card ═══ */
#title-card {
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    45deg, var(--mauve-d) 0px, var(--mauve-d) 4px,
    rgba(99,66,85,0.7) 4px, rgba(99,66,85,0.7) 8px);
  z-index: 400; display: none; align-items: center; justify-content: center;
  font-family: monospace; transition: all 0.4s ease;
}
#title-card.show { display: flex; }
#title-card.as-header {
  inset: unset; top: 0; left: 0; right: 0; height: 48px;
  background: var(--forest); border-bottom: 4px solid var(--pk-black);
  align-items: center; justify-content: flex-start;
  padding: 0 16px; display: flex;
  box-shadow: 0 4px 0 var(--pk-black);
}
#title-card-inner { text-align: center; padding: 40px; max-width: 600px; transition: all 0.4s ease; }
#title-card.as-header #title-card-inner {
  display: flex; align-items: center; gap: 16px; padding: 0; text-align: left;
}
#title-card-loading {
  color: var(--sand); font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase;
}
#title-card-content { display: none; }
#title-card-content.show { display: block; }
#title-card.as-header #title-card-content { display: flex; align-items: center; gap: 14px; }
.tc-label {
  font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase;
  color: var(--moss); margin-bottom: 24px;
}
#title-card.as-header .tc-label { display: none; }
#tc-title {
  font-size: clamp(2.4rem, 7vw, 4rem); font-weight: bold; letter-spacing: 4px;
  text-transform: uppercase; color: var(--pk-white);
  text-shadow: 4px 4px 0 var(--pk-black), 0 0 40px rgba(127,199,97,0.4);
  margin-bottom: 16px; line-height: 1.1; transition: all 0.4s ease;
}
#title-card.as-header #tc-title {
  font-size: 0.95rem; letter-spacing: 3px; margin-bottom: 0;
  text-shadow: 1px 1px 0 var(--pk-black); color: var(--pk-white);
}
#tc-tagline {
  font-size: 0.9rem; color: var(--sand); letter-spacing: 2px; margin-bottom: 40px;
  transition: all 0.4s ease;
}
#title-card.as-header #tc-tagline {
  font-size: 0.65rem; letter-spacing: 1px; margin-bottom: 0; color: var(--moss);
  border-left: 3px solid var(--pk-black); padding-left: 14px;
}
#tc-begin { display: inline-block; }
#title-card.as-header #tc-begin { display: none; }
.tc-scanline {
  position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
}
#title-card.as-header .tc-scanline { display: none; }

/* ═══ Scroll Overlay ═══ */
#scroll-scrim { position:fixed; inset:0; background:rgba(60,20,35,0.7); z-index:200; display:none; }
#scroll-scrim.open { display:flex; align-items:center; justify-content:center; }
#scroll-wrap {
  width: 440px; max-width: 92vw; max-height: 85vh;
  display: flex; flex-direction: column; image-rendering: pixelated;
  box-shadow: 6px 6px 0 var(--pk-black);
}
.scroll-spindle {
  height: 28px; background: var(--fawn);
  border: 3px solid var(--pk-black); position: relative; z-index: 2;
  box-shadow: inset 0 4px 0 rgba(255,255,255,0.3), inset 0 -4px 0 rgba(0,0,0,0.25);
}
.scroll-spindle::before, .scroll-spindle::after {
  content:''; position:absolute; top:-6px; width:22px; height:38px;
  background: var(--mauve-d); border:3px solid var(--pk-black); border-radius:3px;
}
.scroll-spindle::before { left:-14px; }
.scroll-spindle::after { right:-14px; }
.scroll-body {
  background: var(--sand);
  border-left: 5px solid var(--pk-black); border-right: 5px solid var(--pk-black);
  padding: 20px 24px; overflow-y: auto; flex: 1; min-height: 120px; max-height: 55vh;
  font-family: monospace; color: var(--mauve-d); font-size: 13px; line-height: 1.7;
}
.scroll-body::-webkit-scrollbar { width:6px; }
.scroll-body::-webkit-scrollbar-thumb { background: var(--mauve); border: 1px solid var(--pk-black); }
.scroll-from { font-size:11px; color: var(--mauve-d); text-transform:uppercase; letter-spacing:2px; margin-bottom:4px; font-weight:bold; }
.scroll-title { font-size:16px; font-weight:bold; color: var(--mauve-d); margin-bottom:12px; border-bottom:3px solid var(--pk-black); padding-bottom:8px; }
.scroll-finding { margin-bottom:10px; padding-left:12px; border-left:4px solid var(--forest); }
.scroll-finding b { color: var(--forest); }
.scroll-actions {
  background: var(--pk-cream); border-left:5px solid var(--pk-black); border-right:5px solid var(--pk-black);
  border-top: 3px solid var(--pk-black);
  padding: 12px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.scroll-btn {
  font-family: monospace; font-size: 12px; font-weight: bold; text-transform: uppercase;
  letter-spacing: 1px; padding: 8px 18px; border: 3px solid var(--pk-black); cursor: pointer;
  image-rendering: pixelated; position: relative;
  box-shadow: 4px 4px 0 var(--pk-black);
  background-image: linear-gradient(to bottom,
    rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.5) 32%,
    transparent 32%, rgba(0,0,0,0.08) 100%);
  transition: none;
}
.scroll-btn:active { transform:translate(4px,4px); box-shadow:none; }
.scroll-btn-next  { background-color: var(--moss);  color: var(--pk-black); }
.scroll-btn-retry { background-color: var(--fawn);  color: var(--pk-black); }
.scroll-retry-input {
  width: 100%; padding: 8px 12px; font-family: monospace; font-size: 13px;
  background: var(--pk-white); border: 3px solid var(--pk-black); color: var(--mauve-d);
  outline: none; display:none; margin-top: 6px;
}
.scroll-retry-input:focus { border-color: var(--forest); }
.scroll-retry-input.show { display:block; }

/* ═══ Task Complete Text Box ═══ */
#task-box-wrap {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 520px; max-width: 96vw; z-index: 300; display: none;
  font-family: monospace; padding-bottom: 12px;
}
#task-box-wrap.open { display: block; }
#task-box {
  box-shadow: 6px 6px 0 var(--pk-black);
}
.task-box-agent-bar { height: 4px; }
#task-box-from {
  font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
  padding: 8px 14px 2px; font-weight: bold;
}
#task-box-msg {
  font-size: 0.85rem; color: var(--pk-black); padding: 6px 14px 10px; line-height: 1.5;
}
#task-box-options { display: flex; gap: 10px; padding: 0 14px 14px; }
.task-box-btn {
  font-family: monospace; font-size: 0.8rem; font-weight: bold;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 8px 24px; border: 3px solid var(--pk-black); cursor: pointer;
  box-shadow: 4px 4px 0 var(--pk-black);
  background-image: linear-gradient(to bottom,
    rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.5) 32%,
    transparent 32%, rgba(0,0,0,0.08) 100%);
  transition: none;
}
.task-box-btn:active { transform: translate(4px,4px); box-shadow: none; }
#task-box-yes   { background-color: var(--moss);    color: var(--pk-black); }
#task-box-retry { background-color: var(--fawn);    color: var(--pk-black); }
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- Onboarding overlay -->
<div id="onboarding-overlay">
  <div id="onboarding-box" class="poke-box">
    <span class="pk-corner pk-tl"></span><span class="pk-corner pk-tr"></span>
    <span class="pk-corner pk-bl"></span><span class="pk-corner pk-br"></span>
    <div id="onboarding-header">
      <div class="ob-label">&#9632; System Boot Complete</div>
      <h1>Welcome to your<br>Building Hub</h1>
      <p>Your AI team is standing by.</p>
    </div>
    <div id="onboarding-body">
      <label for="onboarding-input">What do you want to build today?</label>
      <input id="onboarding-input" type="text" placeholder="e.g. a tool that helps indie devs ship faster..." autocomplete="off" />
      <button id="onboarding-submit" class="poke-btn poke-btn-green">&#9654; Assemble My Team</button>
      <div class="ob-agents">
        <div class="ob-agent-chip" style="color:#7FC761">&#9632; BizOps</div>
        <div class="ob-agent-chip" style="color:#634255">&#9632; Researcher</div>
        <div class="ob-agent-chip" style="color:#9D7375">&#9632; Designer</div>
        <div class="ob-agent-chip" style="color:#63ACF0">&#9632; Engineer</div>
      </div>
    </div>
  </div>
</div>

<!-- Title card -->
<div id="title-card">
  <div class="tc-scanline"></div>
  <div id="title-card-inner">
    <div id="title-card-loading">&#9632; Naming your product<span id="tc-dots"></span></div>
    <div id="title-card-content">
      <div class="tc-label">&#9632; Your product</div>
      <div id="tc-title"></div>
      <div id="tc-tagline"></div>
      <button id="tc-begin" class="poke-btn poke-btn-green">Enter the hub &#9654;</button>
    </div>
  </div>
</div>

<!-- Task complete text box (yes/retry prompt) -->
<div id="task-box-wrap">
  <div id="task-box" class="poke-box">
    <span class="pk-corner pk-tl"></span><span class="pk-corner pk-tr"></span>
    <span class="pk-corner pk-bl"></span><span class="pk-corner pk-br"></span>
    <div class="task-box-agent-bar" id="task-box-bar"></div>
    <div id="task-box-from"></div>
    <div id="task-box-msg"></div>
    <div id="task-box-options">
      <button class="task-box-btn" id="task-box-yes">YES — View Report</button>
      <button class="task-box-btn" id="task-box-retry">RETRY</button>
    </div>
  </div>
</div>

<!-- Scroll overlay for agent findings -->
<div id="scroll-scrim">
  <div id="scroll-wrap" class="poke-box">
    <span class="pk-corner pk-tl"></span><span class="pk-corner pk-tr"></span>
    <span class="pk-corner pk-bl"></span><span class="pk-corner pk-br"></span>
    <div class="scroll-spindle"></div>
    <div class="scroll-body" id="scroll-body"></div>
    <div class="scroll-actions">
      <button class="scroll-btn scroll-btn-next" id="scroll-next">NEXT</button>
      <button class="scroll-btn scroll-btn-retry" id="scroll-retry">RETRY</button>
      <input class="scroll-retry-input" id="scroll-retry-input" placeholder="Tell the agent what to redo..." />
    </div>
    <div class="scroll-spindle"></div>
  </div>
</div>

<script src="/agents.js"></script>
<div id="detail-scrim"></div>
<div id="detail-panel">
  <div class="dp-header">
    <div style="display:flex;align-items:center"><span class="dp-badge" id="dp-badge"></span><h2 id="dp-title"></h2></div>
    <button class="dp-close" id="dp-close">&times;</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>
<script>
// Agent findings cache — populated by real API calls, with fallback demo data
const AGENT_FINDINGS = {};

// Fire real API call when agent starts working
async function fetchAgentFindings(agentName) {
  try {
    const resp = await fetch("/api/agent", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ agent: agentName, context: productContext || undefined }),
    });
    if (!resp.ok) throw new Error("API " + resp.status);
    const data = await resp.json();
    AGENT_FINDINGS[agentName] = { title: AGENT_TITLES[agentName] || agentName + " Report", findings: data.findings };
  } catch(e) {
    console.warn("API call failed for", agentName, "— using demo data:", e.message);
    AGENT_FINDINGS[agentName] = DEMO_FINDINGS[agentName];
  }
}

// Fetch a live status quip for the agent (fast, Haiku model)
const AGENT_STATUS = {};
async function fetchAgentStatus(agentName) {
  try {
    const resp = await fetch("/api/agent", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ agent: agentName, context: productContext || undefined, type: "status" }),
    });
    if (!resp.ok) throw new Error("API " + resp.status);
    const data = await resp.json();
    AGENT_STATUS[agentName] = data.message;
  } catch(e) {
    console.warn("Status fetch failed for", agentName, ":", e.message);
  }
}

const ZONE_NAMES = { discover:"Discovery Zone", design:"Design Zone", build:"Build Zone" };

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const TILE = 16, SCALE = 3, TS = TILE*SCALE;
const COLS = 48, ROWS = 34;
const WORLD_W = COLS*TILE, WORLD_H = ROWS*TILE;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// ═══════════════════════════════════════════
// ZONES — Discover is large & nature-themed
// ═══════════════════════════════════════════
const ZONES = {
  discover: { x:2, y:2, w:22, h:18, color:"#7FC761", darkColor:"#40812E" },
  design:   { x:28, y:2, w:14, h:12, color:"#9D7375", darkColor:"#634255" },
  build:    { x:28, y:18, w:14, h:12, color:"#63ACF0", darkColor:"#3a80c0" },
};

// Workstation positions (tile coords) & egg positions within discover
const WORKSTATIONS = {
  store: { x:5, y:5, w:5, h:4 },   // BizOps store
  lab:   { x:16, y:13, w:5, h:4 },  // Researcher lab
};

// Area Labels Config (OO structure for easy collaboration)
// Uses scroll-style rendering with PALETTE colors
const AREA_LABELS = [
  {
    id: "store",
    title: "STORE",
    subtitle: "BizOps",
    position: { x: 7.5, y: 5 },
    titleColor: "#40812E",
    subtitleColor: "#634255"
  },
  {
    id: "lab",
    title: "LAB",

// TILEMAP
// 0=grass 1=path 2=water 3=zone-floor 4=zone-border
// 5=flowers 6=tree 7=lab-floor 8=lab-equip(block)
// 9=store-floor 10=store-shelf(block) 11=dense-tree
// 12=spawn-pad (walkable, interactive)
// ═══════════════════════════════════════════
const map = [];
for (let y=0;y<ROWS;y++){map[y]=[];for(let x=0;x<COLS;x++)map[y][x]=0;}

// Place zone borders & floors
for(const[key,z]of Object.entries(ZONES)){
  for(let dy=0;dy<z.h;dy++)for(let dx=0;dx<z.w;dx++){
    const tx=z.x+dx,ty=z.y+dy;
    if(ty<ROWS&&tx<COLS) map[ty][tx]=(dx===0||dx===z.w-1||dy===0||dy===z.h-1)?4:3;
  }
}

// --- DISCOVER ZONE: Nature features ---
// Pond (upper-right area of discover)
const pondX=17,pondY=5;
for(let dy=0;dy<4;dy++)for(let dx=0;dx<4;dx++){
  const px=pondX+dx,py=pondY+dy;
  if(map[py]&&map[py][px]===3)map[py][px]=2;
}

// Store area (BizOps workstation) — wood floor + shelves
const st=WORKSTATIONS.store;
for(let dy=0;dy<st.h;dy++)for(let dx=0;dx<st.w;dx++){
  const tx=st.x+dx,ty=st.y+dy;
  if(map[ty]&&map[ty][tx]===3){
    if(dy===0||(dx===0&&dy<st.h-1)) map[ty][tx]=10; // shelves on top & left wall
    else map[ty][tx]=9; // wood floor
  }
}

// Lab area (Researcher workstation) — grey floor + equipment
const lb=WORKSTATIONS.lab;
for(let dy=0;dy<lb.h;dy++)for(let dx=0;dx<lb.w;dx++){
  const tx=lb.x+dx,ty=lb.y+dy;
  if(map[ty]&&map[ty][tx]===3){
    if(dy===0||(dx===lb.w-1&&dy<lb.h-1)) map[ty][tx]=8; // equipment on top & right
    else map[ty][tx]=7; // lab floor
  }
}

// Winding path through discover zone
const discPath = [
  // Entrance from right side
  ...Array.from({length:4},(_,i)=>({x:23+i,y:10})),
  ...Array.from({length:4},(_,i)=>({x:23+i,y:11})),
  // Main vertical path through discover
  ...Array.from({length:16},(_,i)=>({x:12,y:3+i})),
  ...Array.from({length:16},(_,i)=>({x:13,y:3+i})),
  // Branch to store
  ...Array.from({length:3},(_,i)=>({x:9+i,y:7})),
  ...Array.from({length:3},(_,i)=>({x:9+i,y:8})),
  // Branch to lab
  ...Array.from({length:3},(_,i)=>({x:14+i,y:15})),
  ...Array.from({length:3},(_,i)=>({x:14+i,y:16})),
  // Connection horizontal at middle
  ...Array.from({length:10},(_,i)=>({x:4+i,y:10})),
  ...Array.from({length:10},(_,i)=>({x:4+i,y:11})),
];
for(const p of discPath){
  if(map[p.y]&&map[p.y][p.x]===3) map[p.y][p.x]=1;
}

// Paths connecting zones
// Discover right → Design left (y:10,11)
for(let x=ZONES.discover.x+ZONES.discover.w;x<ZONES.design.x;x++){map[10][x]=1;map[11][x]=1;}
// Design bottom → Build top (x:34,35)
for(let y=ZONES.design.y+ZONES.design.h;y<ZONES.build.y;y++){map[y][34]=1;map[y][35]=1;}

// Punch doorways
for(let pass=0;pass<2;pass++){
  for(let y=1;y<ROWS-1;y++)for(let x=1;x<COLS-1;x++){
    if(map[y][x]===4){
      const n=[map[y-1]?.[x],map[y+1]?.[x],map[y][x-1],map[y][x+1]];
      if(n.includes(1)||(pass===1&&n.includes(3)&&n.includes(1))) map[y][x]=3;
    }
  }
}

// Scatter trees in discover zone grass areas
for(let y=ZONES.discover.y+1;y<ZONES.discover.y+ZONES.discover.h-1;y++){
  for(let x=ZONES.discover.x+1;x<ZONES.discover.x+ZONES.discover.w-1;x++){
    if(map[y][x]===3&&Math.random()<0.08) map[y][x]=6;
  }
}
// Dense trees on world borders
for(let x=0;x<COLS;x++){if(map[0][x]===0)map[0][x]=11;if(map[ROWS-1][x]===0)map[ROWS-1][x]=11;}
for(let y=0;y<ROWS;y++){if(map[y][0]===0)map[y][0]=11;if(map[y][COLS-1]===0)map[y][COLS-1]=11;}

// Flowers on discover zone grass
for(let y=ZONES.discover.y+1;y<ZONES.discover.y+ZONES.discover.h-1;y++)
  for(let x=ZONES.discover.x+1;x<ZONES.discover.x+ZONES.discover.w-1;x++)
    if(map[y][x]===3&&Math.random()<0.06) map[y][x]=5;

// Flowers on open grass
for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)
  if(map[y][x]===0&&Math.random()<0.03) map[y][x]=5;

// Spawn pad — 2×2 tile area in the corridor between Discover and Design (x:25-26, y:13-14)
map[13][25]=12; map[13][26]=12;
map[14][25]=12; map[14][26]=12;

// Collision — tile 12 (spawn pad) is walkable
function isBlocked(tx,ty){
  if(tx<0||ty<0||tx>=COLS||ty>=ROWS)return true;
  const t=map[ty][tx];
  return t===2||t===6||t===8||t===10||t===11;
}

    if(dialog.phase==="question"||spawnDialog.active){
      if(e.key==='ArrowUp'||e.key==='w'){dialog.selectedOption=Math.max(0,dialog.selectedOption-1);spawnDialog.selectedOption=Math.max(0,spawnDialog.selectedOption-1);}
      if(e.key==='ArrowDown'||e.key==='s'){dialog.selectedOption=Math.min(1,dialog.selectedOption+1);spawnDialog.selectedOption=Math.min(spawnDialog.options.length-1,spawnDialog.selectedOption+1);}
    }
    return;
  }
  if(scrollOpen){if(e.key==='Escape')closeScroll();return;}
  if(e.key===' '||e.key==='Enter'){e.preventDefault();tryInteract();}
  if(e.key==='Escape')closeDetailPanel();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

function handleDialogInput(){
  // Spawn pad dialog
  if(spawnDialog.active){
    const chosen=spawnDialog.options[spawnDialog.selectedOption];
    if(chosen){
      const target=agents.find(a=>a.name===chosen);
      if(target)target.triggerHatch();
    }
    spawnDialog.active=false;dialog.active=false;dialog.phase="typing";
    return;
  }
  if(dialog.phase==="typing"){dialog.displayedChars=dialog.text.length;dialog.phase="done";}
  else if(dialog.phase==="done"){dialog.phase="question";dialog.selectedOption=0;}
  else if(dialog.phase==="question"){
    if(dialog.selectedOption===0){openDetailPanel(dialog.agentIndex);closeDialog();}
    else closeDialog();
  }
}
function closeDialog(){dialog.active=false;dialog.phase="typing";spawnDialog.active=false;}

function getAdjacentAgent(){
  for(let i=0;i<agents.length;i++){
    if(agents[i].state!=="working"&&agents[i].state!=="egg"&&agents[i].state!=="walking_to_egg")continue;
    const dx=Math.abs(agents[i].x-player.x),dy=Math.abs(agents[i].y-player.y);
    if(dx<=1&&dy<=1&&(dx+dy)<=2)return i;
  }
  return -1;
}

function isAdjacentToSpawnPad(){
  const checks=[[0,0],[1,0],[-1,0],[0,1],[0,-1]];
  for(const[dx,dy]of checks){
    const tx=player.x+dx,ty=player.y+dy;
    if(tx>=0&&ty>=0&&tx<COLS&&ty<ROWS&&map[ty][tx]===12)return true;
  }
  return false;
}

function openSpawnDialog(){
  const available=agents.filter(a=>a.state==="egg"&&a.sleepState==="fresh"&&a.completedTaskCount===0).map(a=>a.name);
  if(available.length===0){
    dialog.active=true;dialog.text="All agents are already active or resting.";
    dialog.displayedChars=0;dialog.charTimer=0;dialog.agentIndex=-1;dialog.phase="typing";dialog.selectedOption=0;
    return;
  }
  spawnDialog.active=true;spawnDialog.options=available;spawnDialog.selectedOption=0;
  dialog.active=true;dialog.text="Spawn pad: Choose an agent to summon.";
  dialog.displayedChars=dialog.text.length;dialog.charTimer=0;dialog.agentIndex=-1;dialog.phase="question";dialog.selectedOption=0;
}

function tryInteract(){
  // Check spawn pad first
  if(isAdjacentToSpawnPad()&&!dialog.active){openSpawnDialog();return;}
  const idx=getAdjacentAgent();if(idx===-1)return;
  const a=agents[idx];
  if(a.state==="egg"){
    const sleepMsg=a.sleepState==="resting"?` ${a.name} has completed their tasks and is resting.`:`A dormant egg... ${a.name} is waiting to be summoned.`;
    dialog.active=true;dialog.text=sleepMsg;
    dialog.displayedChars=0;dialog.charTimer=0;dialog.agentIndex=idx;dialog.phase="typing";dialog.selectedOption=0;
    return;
  }
  const liveStatus=AGENT_STATUS[a.name];
  dialog.active=true;dialog.text=liveStatus||"Crunching, getting information...";
  dialog.displayedChars=0;dialog.charTimer=0;dialog.agentIndex=idx;dialog.phase="typing";dialog.selectedOption=0;
}

// MOVEMENT
// ═══════════════════════════════════════════
const MOVE_SPEED=2;
function updatePlayer(){
  if(dialog.active||scrollOpen||textBoxOpen)return;
  if(player.moving){
    const tx=player.targetX*TILE,ty=player.targetY*TILE,dx=tx-player.px,dy=ty-player.py;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<MOVE_SPEED){player.px=tx;player.py=ty;player.x=player.targetX;player.y=player.targetY;player.moving=false;player.frame=0;}
    else{player.px+=(dx/dist)*MOVE_SPEED;player.py+=(dy/dist)*MOVE_SPEED;player.moveTimer++;player.frame=Math.floor(player.moveTimer/8)%2;}
    return;
  }
  let dx=0,dy=0,dir=player.dir;
  if(keys['ArrowUp']||keys['w']||keys['W']){dy=-1;dir="up";}
  else if(keys['ArrowDown']||keys['s']||keys['S']){dy=1;dir="down";}
  else if(keys['ArrowLeft']||keys['a']||keys['A']){dx=-1;dir="left";}
  else if(keys['ArrowRight']||keys['d']||keys['D']){dx=1;dir="right";}
  player.dir=dir;
  if(dx||dy){
    const nx=player.x+dx,ny=player.y+dy;
    if(!isBlocked(nx,ny)&&!agents.some(a=>a.state==="working"&&a.x===nx&&a.y===ny)){
      player.targetX=nx;player.targetY=ny;player.moving=true;player.moveTimer=0;
    }
  }
}

}

function updateCamera(){
  const tx=player.px*SCALE-canvas.width/2+TS/2,ty=player.py*SCALE-canvas.height/2+TS/2;
  camera.x+=(tx-camera.x)*0.1;camera.y+=(ty-camera.y)*0.1;
  camera.x=Math.max(0,Math.min(WORLD_W*SCALE-canvas.width,camera.x));
  camera.y=Math.max(0,Math.min(WORLD_H*SCALE-canvas.height,camera.y));
}
function updateZoneDetection(){
  let found="";
  for(const[k,z]of Object.entries(ZONES))if(player.x>=z.x&&player.x<z.x+z.w&&player.y>=z.y&&player.y<z.y+z.h){found=k;break;}
  if(found&&found!==lastZoneKey){currentZoneName=ZONE_NAMES[found]||found;zoneNameTimer=120;activePhase=found;}
  lastZoneKey=found;if(zoneNameTimer>0)zoneNameTimer--;
}

function drawTile(x,y){
  const sx=x*TS-camera.x,sy=y*TS-camera.y;
  if(sx+TS<0||sy+TS<0||sx>canvas.width||sy>canvas.height)return;
  const t=map[y][x];
  const seed=(x*31+y*17)%100;
  if(t===0){
    // Rich grass with texture
    ctx.fillStyle=(x+y)%2===0?GRASS1:GRASS2;ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle="#6ab058";for(let i=0;i<4;i++){const gx=sx+(seed+i*23)%TS,gy=sy+(seed+i*17)%TS;ctx.fillRect(gx,gy,2,4);}
    ctx.fillStyle="#9cd080";ctx.fillRect(sx+(seed%30)+4,sy+(seed%20)+8,1,3);
  }
  else if(t===1){
    // Textured path with pebbles
    ctx.fillStyle=(x+y)%2===0?PATH1:PATH2;ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle="#b89848";for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(sx+8+(seed+i*15)%32,sy+8+(seed+i*11)%32,2,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle="#e8c888";ctx.fillRect(sx+(seed%20)+6,sy+(seed%24)+4,3,2);
  }
  else if(t===2){
    // Animated water with ripples and sparkles
    const w=Math.sin(gameTime*0.03+x*0.5+y*0.3)*0.5+0.5;ctx.fillStyle=w>0.5?WATER1:WATER2;ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle="#70b0e8";const ripple=Math.sin(gameTime*0.04+x+y)*4;ctx.fillRect(sx+10+ripple,sy+TS/2,TS/3,2);
    ctx.fillStyle="#80c0f0";ctx.fillRect(sx+5,sy+10+Math.sin(gameTime*0.05+x*2)*3,TS/4,1);
    if(Math.sin(gameTime*0.05+x*2+y*3)>0.85){ctx.fillStyle="rgba(255,255,255,0.6)";ctx.fillRect(sx+TS/3,sy+TS/4,4,4);ctx.fillRect(sx+TS/2+4,sy+TS/2,2,2);}
  }
  else if(t===3){
    const z=getZoneAt(x,y);if(z){ctx.fillStyle=z===ZONES[activePhase]?z.color+"20":z.color+"10";ctx.fillRect(sx,sy,TS,TS);
    // Subtle floor pattern
    ctx.fillStyle=z.color+"08";for(let i=0;i<2;i++)ctx.fillRect(sx+i*24,sy+12,20,2);}
    else{ctx.fillStyle=(x+y)%2===0?GRASS1:GRASS2;ctx.fillRect(sx,sy,TS,TS);}
  }
  else if(t===4){const z=getZoneAt(x,y);if(z){ctx.fillStyle=z===ZONES[activePhase]?z.color+"45":z.color+"20";ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle=z===ZONES[activePhase]?z.color+"65":z.color+"35";ctx.fillRect(sx+2,sy+2,TS-4,TS-4);
    // Corner accents
    ctx.fillStyle=z.color+"80";ctx.fillRect(sx,sy,4,4);ctx.fillRect(sx+TS-4,sy,4,4);ctx.fillRect(sx,sy+TS-4,4,4);ctx.fillRect(sx+TS-4,sy+TS-4,4,4);}}
  else if(t===5){
    // Multi-petal flowers with leaves
    ctx.fillStyle=(x+y)%2===0?GRASS1:GRASS2;ctx.fillRect(sx,sy,TS,TS);
    const fc=FLOWER_COLORS[(x*7+y*13)%FLOWER_COLORS.length];const bob=Math.sin(gameTime*0.02+x+y)*2;
    ctx.fillStyle="#40812E";ctx.fillRect(sx+TS/2-1,sy+TS/3+8+bob,3,12);
    ctx.fillStyle="#5a9050";ctx.fillRect(sx+TS/2+2,sy+TS/2+bob,6,3);ctx.fillRect(sx+TS/2-7,sy+TS/2+4+bob,5,3);
    ctx.fillStyle=fc;ctx.fillRect(sx+TS/2-6,sy+TS/3+bob,5,5);ctx.fillRect(sx+TS/2+2,sy+TS/3+bob,5,5);
    ctx.fillRect(sx+TS/2-2,sy+TS/3-4+bob,5,5);ctx.fillRect(sx+TS/2-2,sy+TS/3+4+bob,5,5);
    ctx.fillStyle="#fff060";ctx.fillRect(sx+TS/2-2,sy+TS/3+bob,4,4);
  }
  else if(t===6){
    // Detailed tree with layered canopy
    ctx.fillStyle=(x+y)%2===0?GRASS1:GRASS2;ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle="#634255";ctx.fillRect(sx+TS/2-4,sy+TS/2-2,8,TS/2+2);
    ctx.fillStyle="#3a2010";ctx.fillRect(sx+TS/2-2,sy+TS/2,4,TS/2);
    ctx.fillStyle="#1e5a16";ctx.beginPath();ctx.arc(sx+TS/2,sy+TS/3,TS/2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#2d7a22";ctx.beginPath();ctx.arc(sx+TS/2-6,sy+TS/3+4,TS/4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+TS/2+8,sy+TS/3+2,TS/4.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#3a9c2e";ctx.beginPath();ctx.arc(sx+TS/2,sy+TS/4,TS/5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#4ab83a";ctx.fillRect(sx+TS/2-2+Math.sin(gameTime*0.03)*2,sy+TS/5,4,3);
  }
  else if(t===7){
    // Lab floor with tiles and glow
    ctx.fillStyle=(x+y)%2===0?LAB_FL:LAB_FL2;ctx.fillRect(sx,sy,TS,TS);
    ctx.strokeStyle="#607080";ctx.lineWidth=1;ctx.strokeRect(sx+1,sy+1,TS-2,TS-2);
    ctx.fillStyle="#90a0b020";ctx.fillRect(sx+4,sy+4,TS/3,TS/3);
  }
  else if(t===8){
    // Lab equipment with bubbling beakers
    ctx.fillStyle=LAB_EQ;ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle="#405060";ctx.fillRect(sx+2,sy+2,TS-4,TS-4);
    const bubY=Math.sin(gameTime*0.06+x)*3;
    ctx.fillStyle="#304050";ctx.fillRect(sx+TS/2-8,sy+TS/2,16,TS/2-4);
    ctx.fillStyle="#50e0b0";ctx.fillRect(sx+TS/2-5,sy+TS/2+4+bubY,10,12);
    ctx.fillStyle="#70ffcc";const bub=Math.sin(gameTime*0.1+x*3);ctx.beginPath();ctx.arc(sx+TS/2-2,sy+TS/2+8+bub*2,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+TS/2+2,sy+TS/2+12+bub*3,1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#80a0c0";ctx.fillRect(sx+6,sy+8,8,6);ctx.fillStyle="#60d0a0";ctx.fillRect(sx+8,sy+10,4,3);
  }
  else if(t===9){
    // Wood floor with grain
    ctx.fillStyle=(x+y)%2===0?STORE_FL:STORE_FL2;ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle="#a08050";ctx.fillRect(sx,sy+TS/3,TS,1);ctx.fillRect(sx,sy+2*TS/3,TS,1);
    ctx.fillStyle="#d0b080";ctx.fillRect(sx+seed%20+4,sy+8,12,1);
  }
  else if(t===10){
    // Store shelf with items
    ctx.fillStyle=STORE_SH;ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle=STORE_SH2;ctx.fillRect(sx+2,sy+3,TS-4,TS/3);ctx.fillRect(sx+2,sy+TS/2+2,TS-4,TS/3);
    ctx.fillStyle="#e06040";ctx.fillRect(sx+6,sy+6,6,8);ctx.fillStyle="#40a0e0";ctx.fillRect(sx+16,sy+5,8,9);
    ctx.fillStyle="#f0d040";ctx.fillRect(sx+28,sy+7,6,6);
    ctx.fillStyle="#a060c0";ctx.fillRect(sx+8,sy+TS/2+5,7,8);ctx.fillStyle="#60c080";ctx.fillRect(sx+20,sy+TS/2+4,10,9);
  }
  else if(t===11){
    // Dense forest with depth
    ctx.fillStyle="#0e3a0a";ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle="#1a4a12";ctx.beginPath();ctx.arc(sx+TS/3,sy+TS/2,TS/3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#2d5a1e";ctx.beginPath();ctx.arc(sx+2*TS/3,sy+TS/3,TS/3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#3a6a28";ctx.beginPath();ctx.arc(sx+TS/2,sy+TS/2,TS/4,0,Math.PI*2);ctx.fill();
  }
  else if(t===12){
    // Spawn pad with enhanced effects
    const p=Math.sin(gameTime*0.05+x*0.8+y*0.8)*0.5+0.5;
    ctx.fillStyle=(x+y)%2===0?"#0d4a4a":"#0a3a3a";ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle="#0f5a5a";ctx.fillRect(sx+8,sy+8,TS-16,TS-16);
    ctx.strokeStyle=`rgba(52,211,153,${0.3+p*0.5})`;ctx.lineWidth=2;ctx.strokeRect(sx+3,sy+3,TS-6,TS-6);
    ctx.strokeStyle=`rgba(52,211,153,${0.15+p*0.3})`;ctx.lineWidth=1;ctx.strokeRect(sx+8,sy+8,TS-16,TS-16);
    ctx.fillStyle=`rgba(52,211,153,${0.6+p*0.4})`;ctx.font="bold "+(TS/2)+"px monospace";ctx.textAlign="center";
    ctx.fillText("+",sx+TS/2,sy+TS/2+TS/6);
  }
}

function drawScrollBanner(ctx, x, y, w, h) {
  const rollW = 10;
  const paper = "#F5E6D3";
  const paperDark = "#DCB5A3";
  const outline = "#3d2a12";

  // Main paper body
  ctx.fillStyle = paper;
  ctx.fillRect(x + rollW, y, w - rollW*2, h);

  // Left roll
  ctx.fillStyle = paperDark;
  ctx.fillRect(x, y + 3, rollW, h - 6);
  ctx.fillStyle = paper;
  ctx.fillRect(x + 3, y + 5, rollW - 3, h - 10);

  // Right roll
  ctx.fillStyle = paperDark;
  ctx.fillRect(x + w - rollW, y + 3, rollW, h - 6);
  ctx.fillStyle = paper;
  ctx.fillRect(x + w - rollW, y + 5, rollW - 3, h - 10);

  // Outline
  ctx.strokeStyle = outline;
  ctx.lineWidth = 2;
  ctx.strokeRect(x + rollW, y, w - rollW*2, h);

  // Dashed inner border
  ctx.strokeStyle = "#c9a96e";
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 2]);
  ctx.strokeRect(x + rollW + 5, y + 4, w - rollW*2 - 10, h - 8);
  ctx.setLineDash([]);
}

function drawZoneLabels(){
  ctx.textAlign="center";
  for(const[k,z]of Object.entries(ZONES)){
    const sx=(z.x+z.w/2)*TS-camera.x,sy=z.y*TS-camera.y-12;
    if(sx<-200||sx>canvas.width+200||sy<-50||sy>canvas.height+50)continue;
    const w = 160, h = 28;
    drawScrollBanner(ctx, sx - w/2, sy - h/2, w, h);
    ctx.fillStyle = "#40812E";
    ctx.font = "bold 12px monospace";
    ctx.fillText(ZONE_NAMES[k].toUpperCase(), sx, sy + 4);
  }
}

// AreaLabel class for OO rendering - Scroll style
class AreaLabel {
  constructor(config) {
    this.id = config.id;
    this.title = config.title;
    this.subtitle = config.subtitle;
    this.position = config.position;
    this.titleColor = config.titleColor;
    this.subtitleColor = config.subtitleColor;
    this.width = 120;
    this.height = 36;
  }

  isVisible(camera, canvas) {
    const sx = this.position.x * TS - camera.x;
    const sy = this.position.y * TS - camera.y;
    return sx > -150 && sx < canvas.width + 150 && sy > -50 && sy < canvas.height + 50;
  }

  drawScroll(ctx, x, y, w, h) {
    const rollW = 8;
    // Scroll colors from palette
    const paper = "#F5E6D3";
    const paperDark = "#DCB5A3";
    const outline = "#3d2a12";

    // Main paper body
    ctx.fillStyle = paper;
    ctx.fillRect(x + rollW, y, w - rollW*2, h);

    // Left roll
    ctx.fillStyle = paperDark;
    ctx.fillRect(x, y + 2, rollW, h - 4);
    ctx.fillStyle = paper;
    ctx.fillRect(x + 2, y + 4, rollW - 2, h - 8);

    // Right roll
    ctx.fillStyle = paperDark;
    ctx.fillRect(x + w - rollW, y + 2, rollW, h - 4);
    ctx.fillStyle = paper;
    ctx.fillRect(x + w - rollW, y + 4, rollW - 2, h - 8);

    // Outline
    ctx.strokeStyle = outline;
    ctx.lineWidth = 2;
    ctx.strokeRect(x + rollW, y, w - rollW*2, h);

    // Dashed inner border
    ctx.strokeStyle = "#c9a96e";
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 2]);
    ctx.strokeRect(x + rollW + 4, y + 4, w - rollW*2 - 8, h - 8);
    ctx.setLineDash([]);
  }

  draw(ctx, camera) {
    const sx = this.position.x * TS - camera.x;
    const sy = this.position.y * TS - camera.y - 16;

    // Draw scroll background
    this.drawScroll(ctx, sx - this.width/2, sy - 14, this.width, this.height);

    // Title (dark brown on parchment)
    ctx.fillStyle = this.titleColor;
    ctx.font = "bold 10px monospace";
    ctx.textAlign = "center";
    ctx.fillText(this.title, sx, sy + 2);

    // Subtitle
    ctx.fillStyle = this.subtitleColor;
    ctx.font = "9px monospace";
    ctx.fillText(this.subtitle, sx, sy + 14);
  }
}

// Instantiate area labels from config
const areaLabelInstances = AREA_LABELS.map(config => new AreaLabel(config));

function drawAreaLabels() {
  for (const label of areaLabelInstances) {
    if (label.isVisible(camera, canvas)) {
      label.draw(ctx, camera);
    }
  }
}

function drawThoughtBubbles(){
  for(const a of agents){
    if(a.state!=="working"||!a.activeTask)continue;
    const sx=a.px*SCALE-camera.x+TS/2,sy=a.py*SCALE-camera.y-8;
    if(sx<-100||sx>canvas.width+100||sy<-50||sy>canvas.height+50)continue;
    const isThinking=a.activeTask.status==="thinking";
    const bubbleColor=isThinking?"#63ACF0":"#D4B269";
    const floatY=Math.sin(gameTime*0.04+a.index*2)*3;
    ctx.fillStyle=bubbleColor+"60";
    ctx.beginPath();ctx.arc(sx-2,sy+floatY+4,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx-6,sy+floatY-2,3,0,Math.PI*2);ctx.fill();
    const bw=120,bh=20,bx=sx-bw/2,by=sy-bh-6+floatY;
    ctx.fillStyle="#f8f4ec";ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle="#1a1a1a";ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
    ctx.strokeStyle=bubbleColor+"60";ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=bubbleColor;ctx.font="bold 8px monospace";ctx.textAlign="left";
    if(isThinking){ctx.fillText("◆"+".".repeat(1+Math.floor(gameTime/20)%3),bx+4,by+13);}
    else{const sc=["⟳","◐","◑","◒"];ctx.fillText(sc[Math.floor(gameTime/15)%4],bx+4,by+13);}
    ctx.fillStyle="#634255";ctx.font="8px monospace";
    let tn=a.activeTask.name;if(tn.length>14)tn=tn.substring(0,13)+"…";
    ctx.fillText(tn,bx+16,by+13);
  }
}

function drawInteractionPrompt(){
  if(dialog.active)return;
  // Agent interaction prompt
  const idx=getAdjacentAgent();
  if(idx!==-1){
    const a=agents[idx];
    const sx=a.px*SCALE-camera.x+TS/2,sy=a.py*SCALE-camera.y-(a.state==="working"?40:16);
    const pulse=0.7+Math.sin(gameTime*0.08)*0.3;ctx.globalAlpha=pulse;
    ctx.fillStyle="#f8f4ec";ctx.fillRect(sx-31,sy-22,62,22);
    ctx.strokeStyle="#1a1a1a";ctx.lineWidth=2;ctx.strokeRect(sx-31,sy-22,62,22);
    ctx.fillStyle="#40812E";ctx.font="bold 10px monospace";ctx.textAlign="center";ctx.fillText("[SPACE]",sx,sy-6);
    ctx.globalAlpha=1;
  }
  // Spawn pad interaction prompt
  if(isAdjacentToSpawnPad()){
    const sx=25.5*TS-camera.x,sy=13*TS-camera.y-24;
    const pulse=0.7+Math.sin(gameTime*0.1)*0.3;ctx.globalAlpha=pulse;
    ctx.fillStyle="#f8f4ec";ctx.fillRect(sx-48,sy-22,96,22);
    ctx.strokeStyle="#1a1a1a";ctx.lineWidth=2;ctx.strokeRect(sx-48,sy-22,96,22);
    ctx.fillStyle="#75C4A4";ctx.font="bold 10px monospace";ctx.textAlign="center";ctx.fillText("[SPACE] SPAWN",sx,sy-6);
    ctx.globalAlpha=1;
  }
}

function drawDialog(){
  if(!dialog.active)return;
  const boxH=136,boxY=canvas.height-boxH-16,boxX=30,boxW=canvas.width-60;
  // Poke box: white fill, thick black border, inner line
  ctx.fillStyle="#f8f4ec";ctx.fillRect(boxX,boxY,boxW,boxH);
  ctx.strokeStyle="#1a1a1a";ctx.lineWidth=4;ctx.strokeRect(boxX,boxY,boxW,boxH);
  ctx.strokeStyle="#1a1a1a";ctx.lineWidth=2;ctx.strokeRect(boxX+6,boxY+6,boxW-12,boxH-12);
  // Corner pokeball circles
  const cR=6,corners=[[boxX,boxY],[boxX+boxW,boxY],[boxX,boxY+boxH],[boxX+boxW,boxY+boxH]];
  for(const[cx,cy]of corners){ctx.fillStyle="#DB3E55";ctx.beginPath();ctx.arc(cx,cy,cR,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#1a1a1a";ctx.lineWidth=2;ctx.stroke();}
  const a=agents[dialog.agentIndex];
  if(dialog.agentIndex>=0){
    const ag=agents[dialog.agentIndex],ps=56,px=boxX+14,py=boxY+(boxH-ps)/2;
    ctx.fillStyle="#e8dfc8";ctx.fillRect(px,py,ps,ps);
    ctx.strokeStyle="#1a1a1a";ctx.lineWidth=2;ctx.strokeRect(px,py,ps,ps);
    if(ag.state==="egg"){ctx.drawImage(eggSprite,px+4,py+4,48,48);}
    else if(agentImages[ag.name]){ctx.drawImage(agentImages[ag.name],px+4,py+4,48,48);}
    else{ctx.drawImage(agentPixelSprites[dialog.agentIndex].frame1,px+4,py+4,48,48);}
    ctx.strokeStyle=ag.color+"80";ctx.lineWidth=1;ctx.strokeRect(px,py,ps,ps);
  }
  const textX=boxX+84,textY=boxY+28,maxWidth=boxW-100;
  if(dialog.phase==="question"){
    ctx.fillStyle="#1a1a1a";ctx.font="12px monospace";ctx.textAlign="left";
    if(spawnDialog.active){
      // Spawn pad: show available agent list
      ctx.fillStyle="#1a1a1a";ctx.fillText(dialog.text,textX,boxY+28);
      const opts=spawnDialog.options;
      for(let i=0;i<opts.length;i++){const sel=spawnDialog.selectedOption===i;ctx.fillStyle=sel?"#40812E":"#87888E";ctx.font=(sel?"bold ":"")+"12px monospace";ctx.fillText((sel?"> ":"  ")+opts[i],textX+8,boxY+50+i*20);}
      ctx.fillStyle="#87888E";ctx.font="9px monospace";ctx.fillText("↑↓ select  SPACE confirm",textX+8,boxY+boxH-10);
    } else {
      // Normal agent dialog: view task list?
      ctx.fillStyle="#1a1a1a";ctx.fillText("View full task list?",textX,boxY+28);
      const opts=["Yes, show details","No thanks"];
      for(let i=0;i<opts.length;i++){const sel=dialog.selectedOption===i;ctx.fillStyle=sel?"#40812E":"#87888E";ctx.font=(sel?"bold ":"")+"12px monospace";ctx.fillText((sel?"> ":"  ")+opts[i],textX+8,boxY+50+i*20);}
    }
  } else {
    if(dialog.phase==="typing"){dialog.charTimer++;if(dialog.charTimer>=1){dialog.charTimer=0;dialog.displayedChars=Math.min(dialog.displayedChars+1,dialog.text.length);if(dialog.displayedChars>=dialog.text.length)dialog.phase="done";}}
    ctx.fillStyle="#1a1a1a";ctx.font="12px monospace";ctx.textAlign="left";
    const words=dialog.text.substring(0,dialog.displayedChars).split(' ');let line='',lineY=textY;
    for(const word of words){const test=line+word+' ';if(ctx.measureText(test).width>maxWidth&&line.length>0){ctx.fillText(line,textX,lineY);line=word+' ';lineY+=16;}else line=test;}
    ctx.fillText(line,textX,lineY);
    if(dialog.phase==="done"){ctx.fillStyle="#9D7375";ctx.font="10px monospace";ctx.fillText("▼ SPACE",textX,boxY+boxH-12);}
  }
}

// HUD
function drawMinimap(){
  const mmW=130,mmH=90,mmX=canvas.width-mmW-12,mmY=12,sx=mmW/COLS,sy=mmH/ROWS;
  ctx.fillStyle="#634255";ctx.beginPath();ctx.roundRect(mmX-4,mmY-4,mmW+8,mmH+8,2);ctx.fill();
  ctx.strokeStyle="#1a1a1a";ctx.lineWidth=2;ctx.strokeRect(mmX-4,mmY-4,mmW+8,mmH+8);
  for(const[k,z]of Object.entries(ZONES)){ctx.fillStyle=z.color+(k===activePhase?"50":"25");ctx.fillRect(mmX+z.x*sx,mmY+z.y*sy,z.w*sx,z.h*sy);}
  for(const a of agents){ctx.fillStyle=a.state==="egg"?"#f5f0e0":a.color;ctx.fillRect(mmX+a.x*sx-1,mmY+a.y*sy-1,3,3);}
  ctx.fillStyle="#DB3E55";ctx.fillRect(mmX+player.x*sx-2,mmY+player.y*sy-2,4,4);
}

function drawAgentRoster(){
  const rX=12;let rY=12;const rH=agents.length*28+22;
  ctx.fillStyle="#634255";ctx.beginPath();ctx.roundRect(rX-2,rY-2,170,rH+4,2);ctx.fill();
  ctx.strokeStyle="#1a1a1a";ctx.lineWidth=2;ctx.strokeRect(rX-2,rY-2,170,rH+4);
  ctx.fillStyle="#D4B269";ctx.font="bold 8px monospace";ctx.textAlign="left";ctx.fillText("▶ TEAM",rX+8,rY+10);rY+=18;
  for(const a of agents){
    ctx.fillStyle=a.color+"30";ctx.fillRect(rX+2,rY-2,164,24);
    const stateColors={egg:"#9D7375",hatching:"#D4B269",walking_to_work:"#D4B269",working:"#7FC761",walking_to_egg:"#f59e0b"};
    if(agentImages[a.name]){ctx.drawImage(agentImages[a.name],rX+4,rY-2,18,18);}
    else{ctx.fillStyle=a.color;ctx.beginPath();ctx.arc(rX+14,rY+8,5,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle=stateColors[a.state]||"#87888E";ctx.beginPath();ctx.arc(rX+22,rY+14,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#f8f4ec";ctx.font="bold 10px monospace";ctx.fillText(a.name,rX+24,rY+8);
    ctx.fillStyle="#DCB5A3";ctx.font="7px monospace";
    const stateLabels={egg:"💤 dormant",hatching:"🥚 hatching...",walking_to_work:"🚶 heading to work",working:"⚡ working",walking_to_egg:"🔙 returning"};
    const rosterLabel=(a.state==="egg"&&a.sleepState==="resting")?"✓ done & resting":stateLabels[a.state]||a.state;
    ctx.fillText(rosterLabel,rX+24,rY+18);
    rY+=28;
  }
}

function drawZonePopup(){
  if(zoneNameTimer<=0)return;ctx.globalAlpha=Math.min(1,zoneNameTimer/30);
  const px=canvas.width/2,py=55;ctx.font="bold 18px monospace";ctx.textAlign="center";
  const mw=ctx.measureText(currentZoneName).width;
  ctx.fillStyle="#f8f4ec";ctx.fillRect(px-mw/2-14,py-16,mw+28,32);
  ctx.strokeStyle="#1a1a1a";ctx.lineWidth=3;ctx.strokeRect(px-mw/2-14,py-16,mw+28,32);
  ctx.fillStyle=ZONES[activePhase]?ZONES[activePhase].darkColor:"#1a1a1a";ctx.fillText(currentZoneName,px,py+6);ctx.globalAlpha=1;
}

function drawControlsHint(){
  ctx.fillStyle="#634255";ctx.fillRect(0,canvas.height-28,canvas.width,28);
  ctx.strokeStyle="#1a1a1a";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,canvas.height-28);ctx.lineTo(canvas.width,canvas.height-28);ctx.stroke();
  ctx.fillStyle="#DCB5A3";ctx.font="10px monospace";ctx.textAlign="left";
  ctx.fillText("WASD/Arrows: Move  |  SPACE: Talk  |  ESC: Close",12,canvas.height-10);
}

// ═══════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════
function update(){gameTime++;updatePlayer();updateAgents();updateCamera();updateZoneDetection();}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle="#634255";ctx.fillRect(0,0,canvas.width,canvas.height);
  const sc=Math.max(0,Math.floor(camera.x/TS)),ec=Math.min(COLS,Math.ceil((camera.x+canvas.width)/TS)+1);
  const sr=Math.max(0,Math.floor(camera.y/TS)),er=Math.min(ROWS,Math.ceil((camera.y+canvas.height)/TS)+1);
  for(let y=sr;y<er;y++)for(let x=sc;x<ec;x++)drawTile(x,y);
  drawZoneLabels();
  drawAreaLabels();

  // Depth-sorted characters + eggs
  const chars=[{type:"player",py:player.py,px:player.px,frame:player.frame}];
  for(let i=0;i<agents.length;i++){
    const a=agents[i];
    if(a.state==="egg")chars.push({type:"egg",index:i,py:a.py,px:a.px});
    else if(a.state==="hatching"){
      if(a.hatchTimer<40)chars.push({type:"egg-crack",index:i,py:a.py,px:a.px});
      else chars.push({type:"agent",index:i,py:a.py,px:a.px,frame:a.frame});
    }
    else chars.push({type:"agent",index:i,py:a.py,px:a.px,frame:a.frame});
  }
  chars.sort((a,b)=>a.py-b.py);
  for(const c of chars){
    if(c.type==="player"){
      if(agentImages["CEO"]) drawAgentImage(agentImages["CEO"],c.px,c.py);
      else drawSprite(c.frame===0?ceoSprites.frame1:ceoSprites.frame2,c.px,c.py);
    }
    else if(c.type==="egg"){
      drawSprite(eggSprite,c.px,c.py);
      // Gentle bob + zzz
      const sx=c.px*SCALE-camera.x+TS/2,sy=c.py*SCALE-camera.y-4;
      ctx.fillStyle="#87888E";ctx.font="7px monospace";ctx.textAlign="center";
      ctx.fillText("💤",sx,sy+Math.sin(gameTime*0.02+c.index)*2);
      // DONE badge — shown when agent has completed ≥1 task and is resting
      const ag=agents[c.index];
      if(ag.sleepState==="resting"){
        const bx=c.px*SCALE-camera.x+TS-4, by=c.py*SCALE-camera.y+2;
        const bw=36,bh=13;
        ctx.fillStyle=ag.color;ctx.fillRect(bx-bw,by,bw,bh);
        ctx.strokeStyle="#1a1a1a";ctx.lineWidth=1;ctx.strokeRect(bx-bw,by,bw,bh);
        ctx.fillStyle="#1a1a1a";ctx.font="bold 8px monospace";ctx.textAlign="center";
        ctx.fillText("✓ DONE",bx-bw/2,by+9);
      }
    }
    else if(c.type==="egg-crack"){
      drawSprite(eggCrackedSprite,c.px,c.py);
      // Shake effect
      const shake=Math.sin(gameTime*0.5)*2;
      const sx=c.px*SCALE-camera.x+TS/2+shake,sy=c.py*SCALE-camera.y-10;
      ctx.fillStyle="#D4B269";ctx.font="9px monospace";ctx.textAlign="center";ctx.fillText("✨",sx,sy);
    }
    else if(c.type==="agent"){
      const aName=agents[c.index].name;
      if(agentImages[aName]) drawAgentImage(agentImages[aName],c.px,c.py);
      else drawSprite(c.frame===0?agentPixelSprites[c.index].frame1:agentPixelSprites[c.index].frame2,c.px,c.py);
    }
  }

  drawThoughtBubbles();drawInteractionPrompt();drawMinimap();drawAgentRoster();drawZonePopup();drawControlsHint();drawDialog();
}

function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
camera.x=player.px*SCALE-canvas.width/2;camera.y=player.py*SCALE-canvas.height/2;

// Onboarding → Title Card → Game
const titleCard=document.getElementById('title-card');
const titleCardContent=document.getElementById('title-card-content');
const titleCardLoading=document.getElementById('title-card-loading');
let tcDotsTimer=null;

function startGame(){
  onboardingOpen=false;
  titleCard.classList.remove('show');
  titleCard.classList.add('as-header');
  gameLoop();
}

document.getElementById('tc-begin').addEventListener('click',startGame);

async function showTitleCard(context){
  document.getElementById('onboarding-overlay').style.display='none';
  titleCard.classList.add('show');

  // Animate loading dots
  let dots=0;
  tcDotsTimer=setInterval(()=>{dots=(dots+1)%4;document.getElementById('tc-dots').textContent='.'.repeat(dots);},400);

  try {
    const resp=await fetch('/api/title',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({context})});
    const data=resp.ok?await resp.json():{title:'Your Product',tagline:'Built with your AI team.'};
    clearInterval(tcDotsTimer);
    document.getElementById('tc-title').textContent=data.title;
    document.getElementById('tc-tagline').textContent=data.tagline;
  } catch {
    clearInterval(tcDotsTimer);
    document.getElementById('tc-title').textContent='Your Product';
    document.getElementById('tc-tagline').textContent='Built with your AI team.';
  }

  titleCardLoading.style.display='none';
  titleCardContent.classList.add('show');
}

function handleOnboardingSubmit(){
  const val=document.getElementById('onboarding-input').value.trim();
  if(!val)return;
  productContext=val;
  showTitleCard(val);
}

document.getElementById('onboarding-submit').addEventListener('click',handleOnboardingSubmit);
document.getElementById('onboarding-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')handleOnboardingSubmit();
});
document.getElementById('onboarding-input').focus();
</script>
