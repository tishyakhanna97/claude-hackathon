<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solopreneur - AI Org World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; overflow: hidden; font-family: monospace; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#detail-panel {
  position: fixed; top: 0; right: 0; width: 420px; max-width: 92vw; height: 100vh;
  background: #0f172a; border-left: 2px solid #334155; z-index: 100;
  transform: translateX(100%); transition: transform 0.25s ease;
  display: flex; flex-direction: column; box-shadow: -8px 0 32px rgba(0,0,0,0.6);
}
#detail-panel.open { transform: translateX(0); }
#detail-scrim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
#detail-scrim.open { display: block; }
.dp-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #1e293b; }
.dp-header h2 { color: #e2e8f0; font-size: 1rem; margin: 0; font-family: monospace; }
.dp-badge { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; padding: 3px 8px; border-radius: 4px; margin-right: 10px; font-weight: 700; font-family: monospace; }
.dp-close { background: none; border: none; color: #64748b; font-size: 1.4rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.dp-close:hover { background: #1e293b; color: #e2e8f0; }
.dp-body { padding: 16px; overflow-y: auto; flex: 1; font-size: 0.8rem; line-height: 1.6; color: #94a3b8; font-family: monospace; }
.dp-section { margin-bottom: 16px; }
.dp-section-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: #475569; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #1e293b; }
.dp-info-row { display: flex; justify-content: space-between; padding: 4px 0; }
.dp-info-label { color: #475569; font-size: 0.7rem; }
.dp-info-value { color: #e2e8f0; font-size: 0.75rem; }
.dp-tag { display: inline-block; font-size: 0.65rem; padding: 2px 6px; border-radius: 3px; margin: 2px 2px 2px 0; }
.dp-tag-skill { background: rgba(139,92,246,0.15); color: #a78bfa; }
.dp-tag-mcp { background: rgba(16,185,129,0.12); color: #6ee7b7; }
.task-item { padding: 8px 10px; margin-bottom: 6px; border-radius: 6px; background: #1e293b; border-left: 3px solid #475569; }
.task-item.running { border-left-color: #fbbf24; }
.task-item.thinking { border-left-color: #8b5cf6; }
.task-item.done { border-left-color: #22c55e; opacity: 0.6; }
.task-status { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
.task-status.running { color: #fbbf24; }
.task-status.thinking { color: #8b5cf6; }
.task-status.done { color: #22c55e; }
.task-name { color: #e2e8f0; font-size: 0.75rem; margin-bottom: 2px; }
.task-detail { color: #64748b; font-size: 0.65rem; }
.task-progress { height: 3px; background: #1e293b; border-radius: 2px; margin-top: 5px; overflow: hidden; }
.task-progress-bar { height: 100%; border-radius: 2px; }

/* ═══ Onboarding Overlay ═══ */
#onboarding-overlay {
  position: fixed; inset: 0; background: rgba(10,15,30,0.96);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  font-family: monospace;
}
#onboarding-box {
  width: 520px; max-width: 92vw;
  border: 3px solid #334155;
  box-shadow: 0 0 0 1px #1e293b, 0 0 60px rgba(34,197,94,0.15);
}
#onboarding-header {
  background: #0f172a; border-bottom: 2px solid #22c55e;
  padding: 20px 28px 16px;
}
#onboarding-header .ob-label {
  font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
  color: #22c55e; margin-bottom: 8px;
}
#onboarding-header h1 {
  font-size: 1.4rem; color: #e2e8f0; letter-spacing: 2px; margin: 0;
  text-transform: uppercase;
}
#onboarding-header p {
  font-size: 0.75rem; color: #64748b; margin: 6px 0 0; letter-spacing: 1px;
}
#onboarding-body {
  background: #0a0f1e; padding: 28px;
}
#onboarding-body label {
  display: block; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
  color: #475569; margin-bottom: 10px;
}
#onboarding-input {
  width: 100%; padding: 12px 14px; font-family: monospace; font-size: 0.9rem;
  background: #1e293b; border: 2px solid #334155; color: #e2e8f0;
  outline: none; box-sizing: border-box;
}
#onboarding-input:focus { border-color: #22c55e; }
#onboarding-input::placeholder { color: #334155; }
#onboarding-submit {
  margin-top: 16px; width: 100%; padding: 12px; font-family: monospace;
  font-size: 0.85rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
  background: linear-gradient(180deg,#22c55e 0%,#16a34a 50%,#15803d 100%);
  color: #052e16; border: 3px solid #1a1a1a; cursor: pointer;
  box-shadow: 0 4px 0 #1a1a1a; transition: transform 0.05s, box-shadow 0.05s;
}
#onboarding-submit:hover { background: linear-gradient(180deg,#4ade80 0%,#22c55e 50%,#16a34a 100%); }
#onboarding-submit:active { transform: translateY(3px); box-shadow: 0 1px 0 #1a1a1a; }
.ob-agents {
  display: flex; gap: 8px; margin-top: 20px; padding-top: 16px;
  border-top: 1px solid #1e293b;
}
.ob-agent-chip {
  flex: 1; padding: 6px 4px; text-align: center;
  background: #1e293b; border: 1px solid #334155;
  font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase;
}

/* ═══ Scroll Overlay ═══ */
#scroll-scrim { position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:200; display:none; }
#scroll-scrim.open { display:flex; align-items:center; justify-content:center; }
#scroll-wrap {
  width: 420px; max-width: 92vw; max-height: 85vh;
  display: flex; flex-direction: column; image-rendering: pixelated;
}
/* Top spindle */
.scroll-spindle {
  height: 28px; background: #8b6a3e;
  border: 3px solid #5c3d1e; position: relative; z-index: 2;
  box-shadow: inset 0 4px 0 #a07d4e, inset 0 -4px 0 #6b4c2a;
}
.scroll-spindle::before, .scroll-spindle::after {
  content:''; position:absolute; top:-6px; width:22px; height:38px;
  background:#6b4c2a; border:3px solid #3d2a12; border-radius:4px;
}
.scroll-spindle::before { left:-14px; }
.scroll-spindle::after { right:-14px; }
/* Parchment body */
.scroll-body {
  background: #f0deb4;
  border-left: 6px solid #c9a96e; border-right: 6px solid #c9a96e;
  box-shadow: inset 4px 0 8px rgba(0,0,0,0.08), inset -4px 0 8px rgba(0,0,0,0.08);
  padding: 20px 24px; overflow-y: auto; flex: 1; min-height: 120px; max-height: 55vh;
  font-family: monospace; color: #3d2a12; font-size: 13px; line-height: 1.7;
}
.scroll-body::-webkit-scrollbar { width:6px; }
.scroll-body::-webkit-scrollbar-thumb { background:#c9a96e; border-radius:3px; }
.scroll-from { font-size:11px; color:#8b6a3e; text-transform:uppercase; letter-spacing:2px; margin-bottom:4px; }
.scroll-title { font-size:16px; font-weight:bold; color:#3d2a12; margin-bottom:12px; border-bottom:2px dashed #c9a96e; padding-bottom:8px; }
.scroll-finding { margin-bottom:10px; padding-left:12px; border-left:3px solid #c9a96e; }
.scroll-finding b { color:#5c3d1e; }
/* Button row */
.scroll-actions {
  background: #e8d4a8; border-left:6px solid #c9a96e; border-right:6px solid #c9a96e;
  padding: 12px 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}
.scroll-btn {
  font-family: monospace; font-size: 13px; font-weight: bold; text-transform: uppercase;
  letter-spacing: 1px; padding: 8px 22px; border: 3px solid #1a1a1a; cursor: pointer;
  image-rendering: pixelated; position: relative;
  box-shadow: 0 4px 0 #1a1a1a;
  transition: transform 0.05s, box-shadow 0.05s;
}
.scroll-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #1a1a1a; }
.scroll-btn-next {
  background: linear-gradient(180deg, #5ce65c 0%, #22b822 50%, #1a9a1a 100%);
  color: #0a3d0a;
}
.scroll-btn-retry {
  background: linear-gradient(180deg, #ffb347 0%, #e68a00 50%, #cc7700 100%);
  color: #4a2800;
}
.scroll-retry-input {
  width: 100%; padding: 9px 12px; font-family: monospace; font-size: 13px;
  background: #f5ecd4; border: 2px solid #c9a96e; color: #3d2a12;
  outline: none; display:none; margin-top: 4px;
}
.scroll-retry-input:focus { border-color: #e68a00; }
.scroll-retry-input.show { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- Onboarding overlay -->
<div id="onboarding-overlay">
  <div id="onboarding-box">
    <div id="onboarding-header">
      <div class="ob-label">&#9632; System Boot Complete</div>
      <h1>Welcome to your<br>Building Hub</h1>
      <p>Your AI team is standing by.</p>
    </div>
    <div id="onboarding-body">
      <label for="onboarding-input">What do you want to build today?</label>
      <input id="onboarding-input" type="text" placeholder="e.g. a tool that helps indie devs ship faster..." autocomplete="off" />
      <button id="onboarding-submit">&#9654; Assemble My Team</button>
      <div class="ob-agents">
        <div class="ob-agent-chip" style="color:#22c55e">&#9632; BizOps</div>
        <div class="ob-agent-chip" style="color:#8b5cf6">&#9632; Researcher</div>
        <div class="ob-agent-chip" style="color:#ec4899">&#9632; Designer</div>
        <div class="ob-agent-chip" style="color:#3b82f6">&#9632; Engineer</div>
      </div>
    </div>
  </div>
</div>

<!-- Scroll overlay for agent findings -->
<div id="scroll-scrim">
  <div id="scroll-wrap">
    <div class="scroll-spindle"></div>
    <div class="scroll-body" id="scroll-body"></div>
    <div class="scroll-actions">
      <button class="scroll-btn scroll-btn-next" id="scroll-next">NEXT</button>
      <button class="scroll-btn scroll-btn-retry" id="scroll-retry">RETRY</button>
      <input class="scroll-retry-input" id="scroll-retry-input" placeholder="Tell the agent what to redo..." />
    </div>
    <div class="scroll-spindle"></div>
  </div>
</div>

<div id="detail-scrim"></div>
<div id="detail-panel">
  <div class="dp-header">
    <div style="display:flex;align-items:center"><span class="dp-badge" id="dp-badge"></span><h2 id="dp-title"></h2></div>
    <button class="dp-close" id="dp-close">&times;</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>
<script>
// ═══════════════════════════════════════════
// DATA — Only discover, design, build
// ═══════════════════════════════════════════
const AGENT_TASKS = {
  "BizOps": [
    { name: "Analyzing competitor pricing", status: "running", detail: "/discover — scanning 5 competitors", progress: 40 },
    { name: "TAM/SAM/SOM estimation", status: "thinking", detail: "/discover — modeling market size", progress: 20 },
    { name: "Go-to-market draft v1", status: "done", detail: "/discover — launch strategy complete", progress: 100 },
  ],
  "Researcher": [
    { name: "Scraping competitor features", status: "running", detail: "/discover — Context7 deep dive", progress: 55 },
    { name: "User sentiment analysis", status: "thinking", detail: "/discover — processing reviews", progress: 25 },
    { name: "Trend report: AI tooling 2026", status: "done", detail: "/discover — 12 key findings", progress: 100 },
  ],
  "Designer": [
    { name: "Wireframing onboarding flow", status: "running", detail: "/design — 3 of 5 screens done", progress: 60 },
    { name: "Color contrast audit (WCAG)", status: "thinking", detail: "/design — checking AA compliance", progress: 45 },
    { name: "Component library audit", status: "done", detail: "/design — catalogued 24 components", progress: 100 },
  ],
  "Engineer": [
    { name: "Building auth module", status: "running", detail: "/build — JWT implementation", progress: 65 },
    { name: "Planning API structure", status: "thinking", detail: "/build — REST vs GraphQL", progress: 30 },
    { name: "Updated error handlers", status: "done", detail: "/build — added 4 error types", progress: 100 },
  ],
};

// Agent findings — populated by real API calls, with fallback demo data
const AGENT_FINDINGS = {};
const DEMO_FINDINGS = {
  "BizOps": { title:"Market Analysis Report", findings:[
    {label:"Competitor Pricing",text:"3 of 5 competitors charge $15-25/mo. One outlier at $49/mo bundles premium support."},
    {label:"TAM Estimate",text:"Total addressable market ~$2.4B for AI dev tools. SAM for solo/indie devs: ~$180M."},
    {label:"Go-to-Market",text:"Recommend freemium with $12/mo pro tier. Launch on Product Hunt + HN."},
    {label:"Key Risk",text:"Crowded market — differentiation through UX and agent orchestration is the moat."},
  ]},
  "Researcher": { title:"Competitive Intelligence Brief", findings:[
    {label:"Feature Gap",text:"No competitor offers visual agent orchestration. Most use chat-only with no transparency."},
    {label:"User Sentiment",text:"Reddit/HN: 72% positive on AI coding tools, #1 complaint is 'black box' — users want to see what the AI is doing."},
    {label:"Trend",text:"Agent-based architectures growing 3x YoY. Multi-agent frameworks gaining traction but lack polish."},
    {label:"Opportunity",text:"'Game-ified AI dashboard' is a completely unoccupied niche."},
  ]},
  "Designer": { title:"Design Direction Brief", findings:[
    {label:"Core Flow",text:"Onboarding → product input → agent dashboard is the critical path. Keep it under 3 steps to first insight."},
    {label:"First Screens",text:"Prioritize the onboarding prompt and the agent findings scroll — these are the two moments that make or break the experience."},
    {label:"Visual Tone",text:"Pixel-retro meets dark SaaS. High contrast, monospace type, and animated sprites signal 'this is different from every other AI tool'."},
    {label:"UX Risk",text:"The game world can confuse non-gamers. Add a short tooltip layer on first load to orient new users quickly."},
  ]},
  "Engineer": { title:"Technical Architecture Plan", findings:[
    {label:"Tech Stack",text:"Next.js or plain HTML + Vercel serverless functions for the backend. No database needed for MVP — stateless API calls only."},
    {label:"Data Model",text:"Product context string → agent name → findings array. Store in-memory on client; no persistence required until v2."},
    {label:"MVP Slice",text:"Ship the onboarding input + one working agent (BizOps) end-to-end before adding Designer and Engineer flows."},
    {label:"Tech Risk",text:"Anthropic API latency can hit 5-10s. Add a loading state to the scroll so users know the agent is 'thinking', not broken."},
  ]},
};
const AGENT_TITLES = { "BizOps":"Market Analysis Report", "Researcher":"Competitive Intelligence Brief", "Designer":"Design Direction Brief", "Engineer":"Technical Architecture Plan" };

// Fire real API call when agent starts working
async function fetchAgentFindings(agentName) {
  try {
    const resp = await fetch("/api/agent", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ agent: agentName, context: productContext || undefined }),
    });
    if (!resp.ok) throw new Error("API " + resp.status);
    const data = await resp.json();
    AGENT_FINDINGS[agentName] = { title: AGENT_TITLES[agentName] || agentName + " Report", findings: data.findings };
  } catch(e) {
    console.warn("API call failed for", agentName, "— using demo data:", e.message);
    AGENT_FINDINGS[agentName] = DEMO_FINDINGS[agentName];
  }
}

const AGENTS = [
  { name:"BizOps", model:"opus", skills:["discover"], mcps:[], desc:"Market analysis & strategy",
    zone:"discover", color:"#22c55e", darkColor:"#14532d", workRole:"store" },
  { name:"Researcher", model:"sonnet", skills:["discover"], mcps:["Context7"], desc:"Competitive analysis & trends",
    zone:"discover", color:"#8b5cf6", darkColor:"#3b0764", workRole:"lab" },
  { name:"Designer", model:"opus", skills:["design"], mcps:["Chrome DevTools"], desc:"UI/UX & wireframes",
    zone:"design", color:"#ec4899", darkColor:"#831843", workRole:"studio" },
  { name:"Engineer", model:"opus", skills:["build"], mcps:["GitHub"], desc:"Architecture & implementation",
    zone:"build", color:"#3b82f6", darkColor:"#1e3a5f", workRole:"desk" },
];

const ZONE_NAMES = { discover:"Discovery Zone", design:"Design Zone", build:"Build Zone" };
const TEAMS = [{ name:"Discovery Sprint", members:["BizOps","Researcher"] }];

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const TILE = 16, SCALE = 3, TS = TILE*SCALE;
const COLS = 48, ROWS = 34;
const WORLD_W = COLS*TILE, WORLD_H = ROWS*TILE;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// ═══════════════════════════════════════════
// ZONES — Discover is large & nature-themed
// ═══════════════════════════════════════════
const ZONES = {
  discover: { x:2, y:2, w:22, h:18, color:"#22c55e", darkColor:"#166534" },
  design:   { x:28, y:2, w:14, h:12, color:"#ec4899", darkColor:"#9d174d" },
  build:    { x:28, y:18, w:14, h:12, color:"#3b82f6", darkColor:"#1e40af" },
};

// Workstation positions (tile coords) & egg positions within discover
const WORKSTATIONS = {
  store: { x:5, y:5, w:5, h:4 },   // BizOps store
  lab:   { x:16, y:13, w:5, h:4 },  // Researcher lab
};
const EGG_POS = {
  "BizOps":    { x:10, y:7 },
  "Researcher": { x:10, y:13 },
  "Designer":  { x:33, y:7 },
  "Engineer":  { x:33, y:23 },
};
const WORK_POS = {
  "BizOps":    { x:7, y:7 },
  "Researcher": { x:18, y:15 },
  "Designer":  { x:34, y:7 },
  "Engineer":  { x:34, y:23 },
};

// ═══════════════════════════════════════════
// TILEMAP
// 0=grass 1=path 2=water 3=zone-floor 4=zone-border
// 5=flowers 6=tree 7=lab-floor 8=lab-equip(block)
// 9=store-floor 10=store-shelf(block) 11=dense-tree
// ═══════════════════════════════════════════
const map = [];
for (let y=0;y<ROWS;y++){map[y]=[];for(let x=0;x<COLS;x++)map[y][x]=0;}

// Place zone borders & floors
for(const[key,z]of Object.entries(ZONES)){
  for(let dy=0;dy<z.h;dy++)for(let dx=0;dx<z.w;dx++){
    const tx=z.x+dx,ty=z.y+dy;
    if(ty<ROWS&&tx<COLS) map[ty][tx]=(dx===0||dx===z.w-1||dy===0||dy===z.h-1)?4:3;
  }
}

// --- DISCOVER ZONE: Nature features ---
// Pond (upper-right area of discover)
const pondX=17,pondY=5;
for(let dy=0;dy<4;dy++)for(let dx=0;dx<4;dx++){
  const px=pondX+dx,py=pondY+dy;
  if(map[py]&&map[py][px]===3)map[py][px]=2;
}

// Store area (BizOps workstation) — wood floor + shelves
const st=WORKSTATIONS.store;
for(let dy=0;dy<st.h;dy++)for(let dx=0;dx<st.w;dx++){
  const tx=st.x+dx,ty=st.y+dy;
  if(map[ty]&&map[ty][tx]===3){
    if(dy===0||(dx===0&&dy<st.h-1)) map[ty][tx]=10; // shelves on top & left wall
    else map[ty][tx]=9; // wood floor
  }
}

// Lab area (Researcher workstation) — grey floor + equipment
const lb=WORKSTATIONS.lab;
for(let dy=0;dy<lb.h;dy++)for(let dx=0;dx<lb.w;dx++){
  const tx=lb.x+dx,ty=lb.y+dy;
  if(map[ty]&&map[ty][tx]===3){
    if(dy===0||(dx===lb.w-1&&dy<lb.h-1)) map[ty][tx]=8; // equipment on top & right
    else map[ty][tx]=7; // lab floor
  }
}

// Winding path through discover zone
const discPath = [
  // Entrance from right side
  ...Array.from({length:4},(_,i)=>({x:23+i,y:10})),
  ...Array.from({length:4},(_,i)=>({x:23+i,y:11})),
  // Main vertical path through discover
  ...Array.from({length:16},(_,i)=>({x:12,y:3+i})),
  ...Array.from({length:16},(_,i)=>({x:13,y:3+i})),
  // Branch to store
  ...Array.from({length:3},(_,i)=>({x:9+i,y:7})),
  ...Array.from({length:3},(_,i)=>({x:9+i,y:8})),
  // Branch to lab
  ...Array.from({length:3},(_,i)=>({x:14+i,y:15})),
  ...Array.from({length:3},(_,i)=>({x:14+i,y:16})),
  // Connection horizontal at middle
  ...Array.from({length:10},(_,i)=>({x:4+i,y:10})),
  ...Array.from({length:10},(_,i)=>({x:4+i,y:11})),
];
for(const p of discPath){
  if(map[p.y]&&map[p.y][p.x]===3) map[p.y][p.x]=1;
}

// Paths connecting zones
// Discover right → Design left (y:10,11)
for(let x=ZONES.discover.x+ZONES.discover.w;x<ZONES.design.x;x++){map[10][x]=1;map[11][x]=1;}
// Design bottom → Build top (x:34,35)
for(let y=ZONES.design.y+ZONES.design.h;y<ZONES.build.y;y++){map[y][34]=1;map[y][35]=1;}

// Punch doorways
for(let pass=0;pass<2;pass++){
  for(let y=1;y<ROWS-1;y++)for(let x=1;x<COLS-1;x++){
    if(map[y][x]===4){
      const n=[map[y-1]?.[x],map[y+1]?.[x],map[y][x-1],map[y][x+1]];
      if(n.includes(1)||(pass===1&&n.includes(3)&&n.includes(1))) map[y][x]=3;
    }
  }
}

// Scatter trees in discover zone grass areas
for(let y=ZONES.discover.y+1;y<ZONES.discover.y+ZONES.discover.h-1;y++){
  for(let x=ZONES.discover.x+1;x<ZONES.discover.x+ZONES.discover.w-1;x++){
    if(map[y][x]===3&&Math.random()<0.08) map[y][x]=6;
  }
}
// Dense trees on world borders
for(let x=0;x<COLS;x++){if(map[0][x]===0)map[0][x]=11;if(map[ROWS-1][x]===0)map[ROWS-1][x]=11;}
for(let y=0;y<ROWS;y++){if(map[y][0]===0)map[y][0]=11;if(map[y][COLS-1]===0)map[y][COLS-1]=11;}

// Flowers on discover zone grass
for(let y=ZONES.discover.y+1;y<ZONES.discover.y+ZONES.discover.h-1;y++)
  for(let x=ZONES.discover.x+1;x<ZONES.discover.x+ZONES.discover.w-1;x++)
    if(map[y][x]===3&&Math.random()<0.06) map[y][x]=5;

// Flowers on open grass
for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)
  if(map[y][x]===0&&Math.random()<0.03) map[y][x]=5;

// Collision
function isBlocked(tx,ty){
  if(tx<0||ty<0||tx>=COLS||ty>=ROWS)return true;
  const t=map[ty][tx];
  return t===2||t===6||t===8||t===10||t===11;
}

window.addEventListener('keydown',e=>{
  if(onboardingOpen)return;
  keys[e.key]=true;
  if(dialog.active){
    if(e.key===' '||e.key==='Enter'){e.preventDefault();handleDialogInput();}
    if(e.key==='Escape')closeDialog();
    if(dialog.phase==="question"){
      if(e.key==='ArrowUp'||e.key==='w')dialog.selectedOption=0;
      if(e.key==='ArrowDown'||e.key==='s')dialog.selectedOption=1;
    }
    return;
  }
  if(scrollOpen){if(e.key==='Escape')closeScroll();return;}
  if(e.key===' '||e.key==='Enter'){e.preventDefault();tryInteract();}
  if(e.key==='Escape')closeDetailPanel();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

function handleDialogInput(){
  if(dialog.phase==="typing"){dialog.displayedChars=dialog.text.length;dialog.phase="done";}
  else if(dialog.phase==="done"){dialog.phase="question";dialog.selectedOption=0;}
  else if(dialog.phase==="question"){
    if(dialog.selectedOption===0){openDetailPanel(dialog.agentIndex);closeDialog();}
    else closeDialog();
  }
}
function closeDialog(){dialog.active=false;dialog.phase="typing";}

function getAdjacentAgent(){
  const fx=player.x+(player.dir==="right"?1:player.dir==="left"?-1:0);
  const fy=player.y+(player.dir==="down"?1:player.dir==="up"?-1:0);
  for(let i=0;i<agents.length;i++){
    if(agents[i].state!=="working"&&agents[i].state!=="egg"&&agents[i].state!=="walking_to_egg")continue;
    const dx=Math.abs(agents[i].x-player.x),dy=Math.abs(agents[i].y-player.y);
    if(dx<=1&&dy<=1&&(dx+dy)<=2)return i;
  }
  return-1;
}

function tryInteract(){
  const idx=getAdjacentAgent();if(idx===-1)return;
  const a=agents[idx];
  if(a.state==="egg"){
    dialog.active=true;
    dialog.text=`A dormant egg... ${a.name} is resting. No active tasks right now.`;
    dialog.displayedChars=0;dialog.charTimer=0;dialog.agentIndex=idx;dialog.phase="typing";dialog.selectedOption=0;
    return;
  }
  const taskStr=a.activeTask?`I'm working on: "${a.activeTask.name}" (${a.activeTask.status}). ${a.activeTask.detail}`:`Idle. Skills: ${a.skills.map(s=>"/"+s).join(", ")}`;
  dialog.active=true;dialog.text=`${a.name}: ${taskStr}`;
  dialog.displayedChars=0;dialog.charTimer=0;dialog.agentIndex=idx;dialog.phase="typing";dialog.selectedOption=0;
}

  h+=`<div class="dp-info-row"><span class="dp-info-label">Role</span><span class="dp-info-value">${a.desc}</span></div>`;
  h+=`<div class="dp-info-row"><span class="dp-info-label">Zone</span><span class="dp-info-value">${ZONE_NAMES[a.zone]}</span></div>`;
  h+=`<div class="dp-info-row"><span class="dp-info-label">State</span><span class="dp-info-value">${a.state}</span></div>`;
  h+='<div style="margin-top:6px">';a.skills.forEach(s=>{h+=`<span class="dp-tag dp-tag-skill">/${s}</span>`;});
  a.mcps.forEach(m=>{h+=`<span class="dp-tag dp-tag-mcp">${m}</span>`;});h+='</div></div>';
  h+='<div class="dp-section"><div class="dp-section-title">Tasks</div>';
  a.tasks.forEach(t=>{
    const icons={running:"⟳",thinking:"◆",done:"✓"};
    const colors={running:"#fbbf24",thinking:"#8b5cf6",done:"#22c55e"};
    h+=`<div class="task-item ${t.status}"><div class="task-status ${t.status}">${icons[t.status]||"○"} ${t.status}</div>`;
    h+=`<div class="task-name">${t.name}</div><div class="task-detail">${t.detail}</div>`;
    if(t.status!=="done")h+=`<div class="task-progress"><div class="task-progress-bar" style="width:${t.progress}%;background:${colors[t.status]}"></div></div>`;
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('dp-body').innerHTML=h;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-scrim').classList.add('open');
}

    a.activeTask=a.tasks.find(t=>t.status==="thinking")||null;
    // Return to egg
    a.state="walking_to_egg";a.targetX=a.eggX;a.targetY=a.eggY;a.moving=true;a.moveTimer=0;
  }
  closeScroll();
});
// RETRY — show text input, then reset task
document.getElementById('scroll-retry').addEventListener('click',()=>{
  const input=scrollRetryInput;
  if(!input.classList.contains('show')){input.classList.add('show');input.focus();return;}
  // Retry: reset task, clear findings so a fresh API call fires
  const retryName=scrollAgentName;
  const a=agents.find(ag=>ag.name===retryName);
  if(a){
    const runningTask=a.tasks.find(t=>t.status==="done"&&t.progress===100)||a.tasks.find(t=>t.status==="running");
    if(runningTask){runningTask.progress=10;runningTask.status="running";a.activeTask=runningTask;}
    a.reportedTask=null;
    delete AGENT_FINDINGS[retryName]; // force new API call
    fetchAgentFindings(retryName);
  }
  input.classList.remove('show');input.value='';
  closeScroll();
});

// ═══════════════════════════════════════════
// MOVEMENT
// ═══════════════════════════════════════════
const MOVE_SPEED=2;
function updatePlayer(){
  if(dialog.active||scrollOpen)return;
  if(player.moving){
    const tx=player.targetX*TILE,ty=player.targetY*TILE,dx=tx-player.px,dy=ty-player.py;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<MOVE_SPEED){player.px=tx;player.py=ty;player.x=player.targetX;player.y=player.targetY;player.moving=false;player.frame=0;}
    else{player.px+=(dx/dist)*MOVE_SPEED;player.py+=(dy/dist)*MOVE_SPEED;player.moveTimer++;player.frame=Math.floor(player.moveTimer/8)%2;}
    return;
  }
  let dx=0,dy=0,dir=player.dir;
  if(keys['ArrowUp']||keys['w']||keys['W']){dy=-1;dir="up";}
  else if(keys['ArrowDown']||keys['s']||keys['S']){dy=1;dir="down";}
  else if(keys['ArrowLeft']||keys['a']||keys['A']){dx=-1;dir="left";}
  else if(keys['ArrowRight']||keys['d']||keys['D']){dx=1;dir="right";}
  player.dir=dir;
  if(dx||dy){
    const nx=player.x+dx,ny=player.y+dy;
    if(!isBlocked(nx,ny)&&!agents.some(a=>a.state==="working"&&a.x===nx&&a.y===ny)){
      player.targetX=nx;player.targetY=ny;player.moving=true;player.moveTimer=0;
    }
  }
}

// ═══════════════════════════════════════════
// AGENT AI — Egg lifecycle
// ═══════════════════════════════════════════
function updateAgents(){
  // Trigger hatching when CEO enters discover zone
  const ceoZone=getZoneKeyAt(player.x,player.y);
  if(ceoZone&&!discoverVisited){
    discoverVisited=true;
  }

  for(const a of agents){
    // Progress tick
    a.progressTick++;
    if(a.progressTick>60){a.progressTick=0;a.tasks.forEach(t=>{
      if(t.status==="running"&&t.progress<95)t.progress+=Math.random()*3;
      if(t.status==="thinking"&&t.progress<80)t.progress+=Math.random()*2;
    });}

    const inZone=getZoneKeyAt(player.x,player.y)===a.zone;

    // State machine
    if(a.state==="egg"){
      if(inZone&&a.activeTask&&!a.hatchTriggered){
        a.hatchTriggered=true;a.state="hatching";a.hatchTimer=0;
      }
    }
    else if(a.state==="hatching"){
      a.hatchTimer++;
      if(a.hatchTimer>80){
        a.state="walking_to_work";
        a.targetX=a.workX;a.targetY=a.workY;a.moving=true;a.moveTimer=0;
      }
    }
    else if(a.state==="walking_to_work"){
      // Move toward workstation
      if(!a.moving){
        if(a.x===a.workX&&a.y===a.workY){a.state="working";a.wanderTimer=60+Math.random()*120;
          // Fire real API call
          if(!AGENT_FINDINGS[a.name]) fetchAgentFindings(a.name);
        }
        else{
          // Simple pathfinding: move one step closer
          const dx=Math.sign(a.workX-a.x),dy=Math.sign(a.workY-a.y);
          let nx=a.x+dx,ny=a.y+dy;
          if(!isBlocked(nx,ny)){a.targetX=nx;a.targetY=ny;a.moving=true;a.moveTimer=0;
            if(dx<0)a.dir="left";else if(dx>0)a.dir="right";else if(dy<0)a.dir="up";else a.dir="down";
          }else{// Try just horizontal or vertical
            if(dx&&!isBlocked(a.x+dx,a.y)){a.targetX=a.x+dx;a.targetY=a.y;a.moving=true;a.moveTimer=0;a.dir=dx<0?"left":"right";}
            else if(dy&&!isBlocked(a.x,a.y+dy)){a.targetX=a.x;a.targetY=a.y+dy;a.moving=true;a.moveTimer=0;a.dir=dy<0?"up":"down";}
          }
        }
      }
    }
    else if(a.state==="working"){
      // Check if running task hit >=95% — trigger scroll report
      if(!a.reportedTask&&a.activeTask&&a.activeTask.status==="running"&&a.activeTask.progress>=95&&AGENT_FINDINGS[a.name]&&!scrollOpen){
        a.reportedTask=a.activeTask;
        openScroll(a.name);
      }
      // Wander near workstation
      a.wanderTimer--;
      if(a.wanderTimer<=0&&!a.moving){
        const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
        const d=dirs[Math.floor(Math.random()*4)];
        const nx=a.x+d[0],ny=a.y+d[1];
        const dfh=Math.abs(nx-a.workX)+Math.abs(ny-a.workY);
        if(!isBlocked(nx,ny)&&dfh<=a.wanderRadius&&!(nx===player.x&&ny===player.y)){
          a.targetX=nx;a.targetY=ny;a.moving=true;a.moveTimer=0;
          if(d[0]<0)a.dir="left";else if(d[0]>0)a.dir="right";else if(d[1]<0)a.dir="up";else a.dir="down";
        }else a.wanderTimer=30+Math.random()*60;
      }
    }
    else if(a.state==="walking_to_egg"){
      // Walk back to egg position
      if(!a.moving){
        if(a.x===a.eggX&&a.y===a.eggY){
          a.state="egg";a.hatchTriggered=false; // back to dormant egg
        }else{
          const dx=Math.sign(a.eggX-a.x),dy=Math.sign(a.eggY-a.y);
          let nx=a.x+dx,ny=a.y+dy;
          if(!isBlocked(nx,ny)){a.targetX=nx;a.targetY=ny;a.moving=true;a.moveTimer=0;
            if(dx<0)a.dir="left";else if(dx>0)a.dir="right";else if(dy<0)a.dir="up";else a.dir="down";
          }else{
            if(dx&&!isBlocked(a.x+dx,a.y)){a.targetX=a.x+dx;a.targetY=a.y;a.moving=true;a.moveTimer=0;a.dir=dx<0?"left":"right";}
            else if(dy&&!isBlocked(a.x,a.y+dy)){a.targetX=a.x;a.targetY=a.y+dy;a.moving=true;a.moveTimer=0;a.dir=dy<0?"up":"down";}
          }
        }
      }
    }

    // Movement interpolation (shared for all moving states)
    if(a.moving){
      const tx=a.targetX*TILE,ty=a.targetY*TILE,dx=tx-a.px,dy=ty-a.py;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<1.5){a.px=tx;a.py=ty;a.x=a.targetX;a.y=a.targetY;a.moving=false;a.frame=0;
        if(a.state==="working")a.wanderTimer=90+Math.random()*150;
      }else{a.px+=(dx/dist)*1.5;a.py+=(dy/dist)*1.5;a.moveTimer++;a.frame=Math.floor(a.moveTimer/10)%2;}
    }
  }
}

function updateCamera(){
  const tx=player.px*SCALE-canvas.width/2+TS/2,ty=player.py*SCALE-canvas.height/2+TS/2;
  camera.x+=(tx-camera.x)*0.1;camera.y+=(ty-camera.y)*0.1;
  camera.x=Math.max(0,Math.min(WORLD_W*SCALE-canvas.width,camera.x));
  camera.y=Math.max(0,Math.min(WORLD_H*SCALE-canvas.height,camera.y));
}
function updateZoneDetection(){
  let found="";
  for(const[k,z]of Object.entries(ZONES))if(player.x>=z.x&&player.x<z.x+z.w&&player.y>=z.y&&player.y<z.y+z.h){found=k;break;}
  if(found&&found!==lastZoneKey){currentZoneName=ZONE_NAMES[found]||found;zoneNameTimer=120;activePhase=found;}
  lastZoneKey=found;if(zoneNameTimer>0)zoneNameTimer--;
}

function drawTile(x,y){
  const sx=x*TS-camera.x,sy=y*TS-camera.y;
  if(sx+TS<0||sy+TS<0||sx>canvas.width||sy>canvas.height)return;
  const t=map[y][x];
  if(t===0){ctx.fillStyle=(x+y)%2===0?GRASS1:GRASS2;ctx.fillRect(sx,sy,TS,TS);}
  else if(t===1){ctx.fillStyle=(x+y)%2===0?PATH1:PATH2;ctx.fillRect(sx,sy,TS,TS);}
  else if(t===2){const w=Math.sin(gameTime*0.03+x*0.5+y*0.3)*0.5+0.5;ctx.fillStyle=w>0.5?WATER1:WATER2;ctx.fillRect(sx,sy,TS,TS);
    if(Math.sin(gameTime*0.05+x*2+y*3)>0.9){ctx.fillStyle="rgba(255,255,255,0.4)";ctx.fillRect(sx+TS/3,sy+TS/4,TS/5,TS/5);}}
  else if(t===3){const z=getZoneAt(x,y);if(z){ctx.fillStyle=z===ZONES[activePhase]?z.color+"20":z.color+"10";ctx.fillRect(sx,sy,TS,TS);}
    else{ctx.fillStyle=(x+y)%2===0?GRASS1:GRASS2;ctx.fillRect(sx,sy,TS,TS);}}
  else if(t===4){const z=getZoneAt(x,y);if(z){ctx.fillStyle=z===ZONES[activePhase]?z.color+"45":z.color+"20";ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle=z===ZONES[activePhase]?z.color+"65":z.color+"35";ctx.fillRect(sx+2,sy+2,TS-4,TS-4);}}
  else if(t===5){ctx.fillStyle=(x+y)%2===0?GRASS1:GRASS2;ctx.fillRect(sx,sy,TS,TS);
    const fc=FLOWER_COLORS[(x*7+y*13)%FLOWER_COLORS.length];const bob=Math.sin(gameTime*0.02+x+y)*2;
    ctx.fillStyle=fc;ctx.fillRect(sx+TS/2-4,sy+TS/3+bob,8,8);ctx.fillStyle="#4a7c3f";ctx.fillRect(sx+TS/2-1,sy+TS/3+8+bob,3,10);}
  else if(t===6){ctx.fillStyle=(x+y)%2===0?GRASS1:GRASS2;ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle="#5a3a1e";ctx.fillRect(sx+TS/2-3,sy+TS/2,6,TS/2);
    ctx.fillStyle="#2d6a1e";ctx.fillRect(sx+4,sy+4,TS-8,TS/2-2);ctx.fillStyle="#3a8c2a";ctx.fillRect(sx+8,sy,TS-16,TS/3);}
  else if(t===7){ctx.fillStyle=(x+y)%2===0?LAB_FL:LAB_FL2;ctx.fillRect(sx,sy,TS,TS);ctx.strokeStyle="#60708040";ctx.strokeRect(sx,sy,TS,TS);}
  else if(t===8){ctx.fillStyle=LAB_EQ;ctx.fillRect(sx,sy,TS,TS);
    // Vial/bubbling
    ctx.fillStyle="#60d0a0";const bubY=Math.sin(gameTime*0.06+x)*3;ctx.fillRect(sx+TS/2-3,sy+TS/3+bubY,6,8);
    ctx.fillStyle="#40b080";ctx.fillRect(sx+TS/2-1,sy+TS/4+bubY,3,4);}
  else if(t===9){ctx.fillStyle=(x+y)%2===0?STORE_FL:STORE_FL2;ctx.fillRect(sx,sy,TS,TS);}
  else if(t===10){ctx.fillStyle=STORE_SH;ctx.fillRect(sx,sy,TS,TS);ctx.fillStyle=STORE_SH2;ctx.fillRect(sx+3,sy+4,TS-6,TS/3);
    ctx.fillRect(sx+3,sy+TS/2+2,TS-6,TS/3);}
  else if(t===11){ctx.fillStyle="#1a4a12";ctx.fillRect(sx,sy,TS,TS);ctx.fillStyle="#2d5a1e";ctx.fillRect(sx+4,sy+4,TS-8,TS-8);}
}

function drawThoughtBubbles(){
  for(const a of agents){
    if(a.state!=="working"||!a.activeTask)continue;

  } else {
    if(dialog.phase==="typing"){dialog.charTimer++;if(dialog.charTimer>=1){dialog.charTimer=0;dialog.displayedChars=Math.min(dialog.displayedChars+1,dialog.text.length);if(dialog.displayedChars>=dialog.text.length)dialog.phase="done";}}
    ctx.fillStyle="#e2e8f0";ctx.font="12px monospace";ctx.textAlign="left";
    const words=dialog.text.substring(0,dialog.displayedChars).split(' ');let line='',lineY=textY;
    for(const word of words){const test=line+word+' ';if(ctx.measureText(test).width>maxWidth&&line.length>0){ctx.fillText(line,textX,lineY);line=word+' ';lineY+=16;}else line=test;}
    ctx.fillText(line,textX,lineY);

// GAME LOOP
// ═══════════════════════════════════════════
function update(){gameTime++;updatePlayer();updateAgents();updateCamera();updateZoneDetection();}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle="#0f172a";ctx.fillRect(0,0,canvas.width,canvas.height);
  const sc=Math.max(0,Math.floor(camera.x/TS)),ec=Math.min(COLS,Math.ceil((camera.x+canvas.width)/TS)+1);
  const sr=Math.max(0,Math.floor(camera.y/TS)),er=Math.min(ROWS,Math.ceil((camera.y+canvas.height)/TS)+1);
  for(let y=sr;y<er;y++)for(let x=sc;x<ec;x++)drawTile(x,y);
  drawZoneLabels();

  // Depth-sorted characters + eggs
  const chars=[{type:"player",py:player.py,px:player.px,frame:player.frame}];
  for(let i=0;i<agents.length;i++){
    const a=agents[i];
    if(a.state==="egg")chars.push({type:"egg",index:i,py:a.py,px:a.px});
    else if(a.state==="hatching"){
      if(a.hatchTimer<40)chars.push({type:"egg-crack",index:i,py:a.py,px:a.px});
      else chars.push({type:"agent",index:i,py:a.py,px:a.px,frame:a.frame});
    }
    else chars.push({type:"agent",index:i,py:a.py,px:a.px,frame:a.frame});
  }
  chars.sort((a,b)=>a.py-b.py);
  for(const c of chars){
    if(c.type==="player"){
      if(agentImages["CEO"]) drawAgentImage(agentImages["CEO"],c.px,c.py);
      else drawSprite(c.frame===0?ceoSprites.frame1:ceoSprites.frame2,c.px,c.py);
    }
    else if(c.type==="egg"){
      drawSprite(eggSprite,c.px,c.py);
      // Gentle bob
      const sx=c.px*SCALE-camera.x+TS/2,sy=c.py*SCALE-camera.y-4;
      ctx.fillStyle="#475569";ctx.font="7px monospace";ctx.textAlign="center";
      ctx.fillText("💤",sx,sy+Math.sin(gameTime*0.02+c.index)*2);
    }
    else if(c.type==="egg-crack"){
      drawSprite(eggCrackedSprite,c.px,c.py);
      // Shake effect
      const shake=Math.sin(gameTime*0.5)*2;
      const sx=c.px*SCALE-camera.x+TS/2+shake,sy=c.py*SCALE-camera.y-10;
      ctx.fillStyle="#fbbf24";ctx.font="9px monospace";ctx.textAlign="center";ctx.fillText("✨",sx,sy);
    }
    else if(c.type==="agent"){
      const aName=agents[c.index].name;
      if(agentImages[aName]) drawAgentImage(agentImages[aName],c.px,c.py);
      else drawSprite(c.frame===0?agentPixelSprites[c.index].frame1:agentPixelSprites[c.index].frame2,c.px,c.py);
    }
  }

  drawThoughtBubbles();drawInteractionPrompt();drawMinimap();drawAgentRoster();drawZonePopup();drawControlsHint();drawDialog();
}

function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
camera.x=player.px*SCALE-canvas.width/2;camera.y=player.py*SCALE-canvas.height/2;

// Onboarding
function startGame(){
  onboardingOpen=false;
  document.getElementById('onboarding-overlay').style.display='none';
  gameLoop();
}

function handleOnboardingSubmit(){
  const val=document.getElementById('onboarding-input').value.trim();
  if(!val)return;
  productContext=val;
  startGame();
}

document.getElementById('onboarding-submit').addEventListener('click',handleOnboardingSubmit);
document.getElementById('onboarding-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')handleOnboardingSubmit();
});
document.getElementById('onboarding-input').focus();
</script>
</body>
