<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hackathon App</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; color: #eee; }
    #ui { margin-top: 16px; display: flex; gap: 8px; }
    button { padding: 8px 16px; background: #e94560; border: none; color: #fff; cursor: pointer; font-family: monospace; font-size: 14px; border-radius: 4px; }
    button:hover { background: #c73652; }
    #output { margin-top: 12px; max-width: 480px; font-size: 13px; text-align: center; color: #aaa; min-height: 20px; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="ui">
    <button id="btn-claude">Ask Claude</button>
    <button id="btn-redis">Ping Redis</button>
  </div>
  <div id="output"></div>

  <script>
    // ── Phaser scene ──────────────────────────────────────────────
    class MainScene extends Phaser.Scene {
      constructor() { super('MainScene'); }

      create() {
        const cx = this.scale.width / 2;
        const cy = this.scale.height / 2;

        // background gradient rect
        const bg = this.add.graphics();
        bg.fillGradientStyle(0x0f3460, 0x0f3460, 0x16213e, 0x16213e, 1);
        bg.fillRect(0, 0, this.scale.width, this.scale.height);

        // spinning triangle
        this.shape = this.add.triangle(cx, cy, 0, 40, -35, -20, 35, -20, 0xe94560);
        this.shape.setStrokeStyle(2, 0xff6b8a);

        // label
        this.add.text(cx, 20, 'claude hackathon', {
          fontSize: '16px', color: '#aaaaaa', fontFamily: 'monospace'
        }).setOrigin(0.5, 0);
      }

      update() {
        this.shape.angle += 1.2;
      }
    }

    new Phaser.Game({
      type: Phaser.AUTO,
      width: 480,
      height: 270,
      backgroundColor: '#16213e',
      parent: 'game-container',
      scene: MainScene,
    });

    // ── API helpers ───────────────────────────────────────────────
    const output = document.getElementById('output');

    document.getElementById('btn-claude').addEventListener('click', async () => {
      output.textContent = 'asking claude...';
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: 'Say hello in one sentence.' }),
        });
        const data = await res.json();
        output.textContent = data.reply ?? data.error;
      } catch (e) {
        output.textContent = 'error: ' + e.message;
      }
    });

    document.getElementById('btn-redis').addEventListener('click', async () => {
      output.textContent = 'pinging redis...';
      try {
        const res = await fetch('/api/redis');
        const data = await res.json();
        output.textContent = JSON.stringify(data);
      } catch (e) {
        output.textContent = 'error: ' + e.message;
      }
    });
  </script>
</body>
</html>
